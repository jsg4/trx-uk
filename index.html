<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>TRX UK — Lower Cross</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Geist:wght@400;500;650&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  /* ---- Lower Cross design tokens (v11 — aligned to the LC design system) */
  /* brand: greens from the DS (#134823 green-ink, #0F2A1D green-dark) */
  --pine:#123524; --pine-2:#134823; --pine-dark:#0F2A1D; --lime:#DAFF00;
  --accent:#DAFF00; --on-accent:#123524;
  /* surfaces + ink (light: brand cream pair, white cards) */
  --page:#F8F6F4; --surface-1:#FFFFFF; --surface-2:#F0EBE6;
  --ink-1:#121B16; --ink-2:#57635B; --ink-3:#7E8A81;
  --border:#E2E0D7; --grid:#EBE9E1; --axis:#B9B6AA;
  /* status — the ONLY red/amber/green on the page */
  --st-good:#177A46; --st-warn:#A96A00; --st-serious:#B45309; --st-crit:#BF3B31;
  --delta-good:#177A46; --delta-bad:#BF3B31;
  --wash:rgba(18,53,36,0.05);
  --wash-good:rgba(23,122,70,0.10); --wash-warn:rgba(169,106,0,0.11); --wash-bad:rgba(191,59,49,0.09);
  /* platform series (charts): harmonized, not neon */
  --s-meta:#33628F; --s-google:#B9862E; --s-tiktok:#3E8767; --s-other:#8A8FA0;
  --seq-250:#8FB2CF;
  /* bucket ramp (spend mix): tonal pine, one hue */
  --bk-core:#123524; --bk-tof:#4E7A5D; --bk-brand:#8FAC94; --bk-other:#CBC7B8;
  /* funnel ordinal ramp (validated light: white card): impressions -> purchases */
  --fn-1:#9FB7A4; --fn-2:#7A9C84; --fn-3:#567F66; --fn-4:#2F5D44; --fn-5:#123524;
  --tfun:#123524;  /* tornado funnel fill */
  /* command bar (pine in both themes) */
  --bar-ink:#F4F6F1; --bar-ink-2:rgba(244,246,241,0.66); --bar-line:rgba(244,246,241,0.16);
  --bar-good:#6FD49A; --bar-warn:#E9B45B; --bar-crit:#F08D84;
  /* shape + elevation + spacing (8pt) — DS-leaning radius, slightly deeper card shadow */
  --r:18px; --r-s:9px;
  --shadow:0 1px 2px rgba(11,16,21,0.04), 0 10px 32px rgba(11,16,21,0.06);
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
  /* type roles — Switzer is the true LC display face (Space Grotesk = DS fallback) */
  --f-display:"Switzer","Space Grotesk",sans-serif;
  --f-ui:"Geist",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  --t-cap:12px; --t-sm:13px; --t-body:14.5px; --t-title:22px; --t-kpi:34px;
}
:root[data-theme="dark"] {
  --page:#0D1411; --surface-1:#151D18; --surface-2:#1C2620;
  --ink-1:#ECEFEA; --ink-2:#A9B4AC; --ink-3:#79857D;
  --border:#28332B; --grid:#202B24; --axis:#4E5A51;
  --st-good:#4CC080; --st-warn:#D9A03C; --st-serious:#E08A3C; --st-crit:#E36B60;
  --delta-good:#4CC080; --delta-bad:#E36B60;
  --wash:rgba(218,255,0,0.05);
  --wash-good:rgba(76,192,128,0.13); --wash-warn:rgba(217,160,60,0.13); --wash-bad:rgba(227,107,96,0.13);
  --s-meta:#5D8DBC; --s-google:#CFA14E; --s-tiktok:#5CAB85; --s-other:#9BA0B0;
  --seq-250:#4F7DA8;
  --bk-core:#C7E463; --bk-tof:#79A886; --bk-brand:#48705A; --bk-other:#3A453D;
  --fn-1:#44604E; --fn-2:#5C7F63; --fn-3:#7B9F72; --fn-4:#9FC276; --fn-5:#C7E463;
  --tfun:#C7E463;
  --shadow:0 1px 2px rgba(0,0,0,0.4);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --page:#0D1411; --surface-1:#151D18; --surface-2:#1C2620;
    --ink-1:#ECEFEA; --ink-2:#A9B4AC; --ink-3:#79857D;
    --border:#28332B; --grid:#202B24; --axis:#4E5A51;
    --st-good:#4CC080; --st-warn:#D9A03C; --st-serious:#E08A3C; --st-crit:#E36B60;
    --delta-good:#4CC080; --delta-bad:#E36B60;
    --wash:rgba(218,255,0,0.05);
    --wash-good:rgba(76,192,128,0.13); --wash-warn:rgba(217,160,60,0.13); --wash-bad:rgba(227,107,96,0.13);
    --s-meta:#5D8DBC; --s-google:#CFA14E; --s-tiktok:#5CAB85; --s-other:#9BA0B0;
    --seq-250:#4F7DA8;
    --bk-core:#C7E463; --bk-tof:#79A886; --bk-brand:#48705A; --bk-other:#3A453D;
    --fn-1:#44604E; --fn-2:#5C7F63; --fn-3:#7B9F72; --fn-4:#9FC276; --fn-5:#C7E463;
    --tfun:#C7E463;
    --shadow:0 1px 2px rgba(0,0,0,0.4);
  }
}

/* ---- base ------------------------------------------------------------ */
* { box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { margin:0; background:var(--page); color:var(--ink-1); font:var(--t-body)/1.5 var(--f-ui); }
.wrap { max-width:1240px; margin:0 auto; padding:var(--s4) var(--s4) var(--s7); }
:focus-visible { outline:2px solid var(--pine); outline-offset:2px; border-radius:4px; }
:root[data-theme="dark"] :focus-visible { outline-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) :focus-visible { outline-color:var(--lime); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition:none !important; animation:none !important; } }

h1 { font-family:var(--f-display); font-size:20px; margin:0; font-weight:700; letter-spacing:-0.02em; }
/* card section label — one label style everywhere */
h2 { font-family:var(--f-ui); font-size:var(--t-cap); margin:0 0 var(--s3); font-weight:650; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.08em; }
.sub { color:var(--ink-2); font-size:var(--t-sm); }
.muted { color:var(--ink-3); }

.card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4) var(--s4); margin-bottom:var(--s4); box-shadow:var(--shadow); }

/* Lower Cross stacked logotype (homepage mark reproduced typographically) */
.lc-logo { font-family:var(--f-display); font-weight:700; font-size:21px; line-height:0.94;
  letter-spacing:0.015em; text-transform:uppercase; color:var(--bar-ink); }
.lc-logo.small { font-size:15px; }
#lock .lc-logo { color:var(--pine); margin-bottom:var(--s3); font-size:24px; }
:root[data-theme="dark"] #lock .lc-logo { color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) #lock .lc-logo { color:var(--lime); } }

/* ---- sidebar (signature: pine rail carries brand + nav) ---------------- */
:root { --sbw:236px; --mbh:56px; }
.sidebar { position:fixed; top:0; bottom:0; left:0; width:var(--sbw); z-index:40;
  background:linear-gradient(180deg, var(--pine) 0%, var(--pine-dark) 100%);
  color:var(--bar-ink); display:flex; flex-direction:column;
  padding:var(--s5) var(--s4) var(--s4); overflow-y:auto; }
.sb-brand .wordmark { color:var(--lime); }
.sb-brand h1 { color:var(--bar-ink); font-size:18px; margin-top:var(--s2); }
.sb-nav { display:flex; flex-direction:column; gap:2px; margin-top:var(--s5); }
.sb-nav a { display:flex; align-items:center; gap:10px; padding:9px 10px;
  border-radius:var(--r-s); font-size:15px; font-weight:500; color:var(--bar-ink-2);
  text-decoration:none; border-left:3px solid transparent; }
.sb-nav a .nic { display:flex; flex:none; opacity:0.7; }
.sb-nav a:hover { color:var(--bar-ink); background:rgba(244,246,241,0.06); }
.sb-nav a.on { color:var(--lime); border-left-color:var(--lime); font-weight:650; background:rgba(218,255,0,0.07); }
.sb-nav a.on .nic { opacity:1; }
.sb-foot { margin-top:auto; padding-top:var(--s4); border-top:1px solid var(--bar-line);
  font-size:var(--t-sm); color:var(--bar-ink-2); display:grid; gap:6px; }
.sb-foot b { color:var(--bar-ink); font-weight:600; }
.sb-foot .attr { font-size:var(--t-cap); }
.sb-foot .stale { color:var(--bar-crit); font-weight:650; }
.sb-foot button.ghost { border-color:var(--bar-line); color:var(--bar-ink-2); justify-self:start; }
.sb-foot button.ghost:hover { color:var(--bar-ink); border-color:var(--bar-ink-2); }
.sidebar :focus-visible { outline-color:var(--lime); }
:root.shell body { padding-left:var(--sbw); }

/* mobile top bar + hamburger (hidden on desktop) */
.mobilebar { display:none; position:fixed; top:0; left:0; right:0; height:var(--mbh); z-index:45;
  background:var(--pine); color:var(--bar-ink); align-items:center; gap:var(--s2); padding:0 var(--s2); }
.mobilebar .wordmark { color:var(--lime); }
.mobilebar .mb-client { font-family:var(--f-display); font-weight:700; font-size:16px; }
.hamb { width:44px; height:44px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:none; border:none; cursor:pointer; padding:0; }
.hamb span { display:block; width:20px; height:2px; background:var(--lime); border-radius:2px; margin:2.5px 0;
  transition:transform .3s cubic-bezier(0.34,1.56,0.64,1), opacity .2s ease; }
:root.nav-open .hamb span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
:root.nav-open .hamb span:nth-child(2) { opacity:0; transform:scaleX(0.4); }
:root.nav-open .hamb span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
.scrim { position:fixed; inset:0; z-index:39; background:rgba(10,20,14,0.5); opacity:0;
  pointer-events:none; transition:opacity .3s ease; }
:root.nav-open .scrim { opacity:1; pointer-events:auto; }

@media (max-width:1023px) {
  :root.shell body { padding-left:0; padding-top:calc(var(--mbh) + var(--s2)); }
  .mobilebar { display:flex; }
  .sidebar { width:min(300px, 84vw); transform:translateX(-105%); box-shadow:0 0 44px rgba(0,0,0,0.35);
    transition:transform .38s cubic-bezier(0.34,1.56,0.64,1); padding-top:calc(var(--mbh) + var(--s3)); }
  /* the persistent top bar already carries the brand — no duplicate in the drawer */
  .sidebar .sb-brand { display:none; }
  .sb-nav { margin-top:0; }
  :root.nav-open .sidebar { transform:none; }
  /* whimsy: nav items spring in one after another as the drawer opens */
  .sb-nav a { opacity:0; transform:translateX(-14px);
    transition:opacity .22s ease, transform .32s cubic-bezier(0.34,1.56,0.64,1); }
  :root.nav-open .sb-nav a { opacity:1; transform:none; transition-delay:calc(40ms * var(--i, 0)); }
  :root.nav-open, :root.nav-open body { overflow:hidden; }
}

/* verdict strip — cockpit, pine strip at the top of the content column */
.topstrip { background:var(--pine); border-radius:var(--r); padding:var(--s3) var(--s4); margin-bottom:var(--s4); box-shadow:var(--shadow); }
.verdict { display:flex; align-items:baseline; gap:var(--s2); font-size:var(--t-body); color:var(--bar-ink); flex-wrap:wrap; }
.verdict .vdot { width:9px; height:9px; border-radius:50%; flex:none; align-self:center; }
.verdict.v-good .vdot { background:var(--bar-good); }
.verdict.v-warn .vdot { background:var(--bar-warn); }
.verdict.v-bad .vdot { background:var(--bar-crit); }
.verdict .vh { font-weight:650; }
.verdict.v-bad .vh { color:var(--bar-crit); }
.verdict.v-warn .vh { color:var(--bar-warn); }
.verdict.v-good .vh { color:var(--bar-good); }
.verdict .vs { color:var(--bar-ink-2); }
.verdict .vs b { color:var(--bar-ink); font-weight:600; }
.verdict a { color:var(--lime); text-decoration:none; font-weight:600; }
.verdict a:hover { text-decoration:underline; }

/* page title */
.pagehead { margin:var(--s2) 0 var(--s3); display:flex; align-items:baseline; gap:var(--s3); flex-wrap:wrap; }
.pagehead .ptitle { font-family:var(--f-display); font-size:var(--t-title); font-weight:700; letter-spacing:-0.02em; }
.pagehead .pctx { margin-left:auto; font-size:var(--t-sm); color:var(--ink-3); font-variant-numeric:tabular-nums; }

/* legacy header pieces (lock screen wordmark) */
.wordmark { font-family:var(--f-display); font-size:10px; letter-spacing:0.22em; color:var(--ink-3); text-transform:uppercase; font-weight:700; }
.chip { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border:1px solid var(--border); border-radius:100px; font-size:var(--t-sm); color:var(--ink-2); background:var(--surface-1); }
.chip b { color:var(--ink-1); }
button.ghost { background:none; border:1px solid var(--border); border-radius:var(--r-s); color:var(--ink-2); padding:6px 12px; font:inherit; font-size:var(--t-sm); cursor:pointer; }
button.ghost:hover { color:var(--ink-1); }

/* ---- decide queues ---------------------------------------------------- */
.decide { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s3); }
.dcol { border:1px solid var(--border); border-top:2px solid var(--border); border-radius:var(--r-s); padding:var(--s3) var(--s4); background:var(--surface-1); }
.dcol h3 { margin:0 0 var(--s2); font-size:var(--t-cap); letter-spacing:0.08em; display:flex; align-items:center; gap:6px; text-transform:uppercase; font-weight:650; }
.dcol h3 .dot { width:8px; height:8px; border-radius:50%; }
.d-now { border-top-color:var(--st-crit); } .d-now h3 { color:var(--st-crit); } .d-now .dot { background:var(--st-crit); }
.d-scale { border-top-color:var(--st-good); } .d-scale h3 { color:var(--st-good); } .d-scale .dot { background:var(--st-good); }
.d-watch { border-top-color:var(--st-warn); } .d-watch h3 { color:var(--st-warn); } .d-watch .dot { background:var(--st-warn); }
.ditem { padding:var(--s2) 0 10px; border-top:1px solid var(--grid); font-size:14px; }
.ditem:first-of-type { border-top:none; }
.ditem .w { font-weight:400; color:var(--ink-2); }
.ditem .w .qname { font-weight:650; color:var(--ink-1); }
.ditem .a { color:var(--ink-2); margin-top:3px; font-size:var(--t-sm); }
.ditem .a::before { content:"→ "; color:var(--ink-3); }
.dempty { color:var(--ink-3); font-size:14px; padding:var(--s2) 0; }
.dkids { margin-top:6px; border-left:2px solid var(--grid); padding-left:10px; }
.dkid { display:flex; align-items:baseline; gap:6px; font-size:var(--t-sm); color:var(--ink-2); padding:2px 0; }
.dkid .kdot { width:6px; height:6px; border-radius:50%; flex:none; align-self:center; }
.dkid.k-pause .kdot { background:var(--st-crit); }
.dkid.k-keep .kdot { background:var(--st-good); }
.dkid.k-best .kdot { background:var(--st-warn); }
.dkid .knm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }
.dkid .kv { margin-left:auto; font-variant-numeric:tabular-nums; white-space:nowrap; color:var(--ink-1); }

/* ---- Daily Guide strip (cockpit top) — section head above a .tiles strip --- */
.dgstrip { margin-bottom:var(--s4); }
.dg-head { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap;
  gap:var(--s2); margin-bottom:var(--s2); }
.dg-head .dg-t { font-family:var(--f-display); font-size:16px; font-weight:700; letter-spacing:-0.01em; }
.dg-head .dg-s { font-size:var(--t-cap); color:var(--ink-3); }
.dgstrip .tiles { margin-bottom:0; }
/* prominent week-over-week comparison: bold colored delta over a quiet prior */
.tile .cmp { display:flex; flex-direction:column; gap:0; margin-top:5px; line-height:1.25; }
.tile .cmp .cmp-d { font-weight:700; font-size:15px; letter-spacing:-0.01em;
  font-variant-numeric:tabular-nums; white-space:nowrap; }
.tile .cmp.up .cmp-d { color:var(--delta-good); }
.tile .cmp.down .cmp-d { color:var(--delta-bad); }
.tile .cmp.flat .cmp-d { color:var(--ink-2); }
.tile .cmp .cmp-vs { color:var(--ink-3); font-weight:500; font-size:var(--t-cap); white-space:nowrap; }
.dgstrip .tile { flex:1 1 196px; min-width:196px; max-width:300px; }
.dgstrip .tile .spark { margin-top:7px; }
.dgstrip .tile .basis { margin-top:6px; }

/* ---- Performance Summary strip: KPIs in one card, divided cells (ref) --- */
.tiles { display:flex; flex-wrap:wrap; background:var(--surface-1); border:1px solid var(--border);
  border-radius:var(--r); box-shadow:var(--shadow); margin-bottom:var(--s4); overflow:hidden; }
.tile { position:relative; flex:1 1 0; min-width:164px; padding:var(--s4) var(--s4) 14px calc(var(--s4) + 6px);
  border-left:1px solid var(--border); }
.tile:first-child { border-left:none; }
/* left status accent bar (the reference's colored tick) */
.tile::before { content:""; position:absolute; left:0; top:var(--s4); bottom:14px; width:3px;
  border-radius:0 3px 3px 0; background:var(--ink-3); opacity:0.3; }
.tile.st-good::before { background:var(--st-good); opacity:1; }
.tile.st-warn::before { background:var(--st-warn); opacity:1; }
.tile.st-bad::before  { background:var(--st-crit); opacity:1; }
.tile-top { display:flex; align-items:flex-start; gap:var(--s2); margin-bottom:6px; min-height:2.7em; }
.tile .lbl { font-size:var(--t-cap); color:var(--ink-3); text-transform:uppercase; letter-spacing:0.07em;
  font-weight:650; line-height:1.35; flex:1; }
.tile .val { font-family:var(--f-display); font-size:29px; font-weight:700; letter-spacing:-0.02em;
  line-height:1.05; font-variant-numeric:tabular-nums; }
.tile .delta { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:100px;
  font-weight:650; font-size:var(--t-cap); background:var(--surface-2); color:var(--ink-2); white-space:nowrap; flex:none; }
.tile .delta.up { background:var(--wash-good); color:var(--delta-good); }
.tile .delta.down { background:var(--wash-bad); color:var(--delta-bad); }
.tile .basis { font-size:var(--t-cap); color:var(--ink-3); margin-top:3px; line-height:1.3; }
.tile svg { display:block; margin-top:var(--s2); width:100%; }
@media (max-width:760px) { .tile { flex:1 1 44%; min-width:44%; } .tile:nth-child(odd) { border-left:none; } }
.sdot { display:none; }
.goalbar { position:relative; height:4px; border-radius:100px; background:var(--grid); margin-top:var(--s2); overflow:visible; }
.goalbar > i { display:block; height:100%; border-radius:100px; }
.goalbar .tick { position:absolute; top:-3px; width:2px; height:10px; background:var(--axis); }

/* ---- routine ---------------------------------------------------------- */
.routine { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s4); }
.routine ol { margin:6px 0 0; padding-left:20px; font-size:14px; color:var(--ink-2); }
.routine li { margin:4px 0; }
.routine b { color:var(--ink-1); }

/* ---- charts ------------------------------------------------------------ */
.chartbox { position:relative; }
.crosshair { position:absolute; top:0; width:1px; background:var(--axis); pointer-events:none; display:none; }
.tooltip { position:absolute; pointer-events:none; display:none; z-index:5; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r-s); padding:var(--s2) 10px; font-size:var(--t-sm); box-shadow:var(--shadow); min-width:150px; }
.tooltip .tt-date { color:var(--ink-3); margin-bottom:4px; }
.tooltip .row { display:flex; align-items:center; gap:6px; margin:2px 0; }
.tooltip .key { width:12px; height:2px; border-radius:1px; flex:none; }
.tooltip .v { font-weight:650; margin-left:auto; padding-left:12px; font-variant-numeric:tabular-nums; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:var(--t-sm); color:var(--ink-2); margin-top:var(--s2); }
.legend .key { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
.legend .keyline { display:inline-block; width:14px; height:2px; border-radius:1px; margin-right:5px; vertical-align:3px; }
.legend .keyline.thick { height:3px; }

/* ---- tables ------------------------------------------------------------ */
table { width:100%; border-collapse:collapse; font-size:14px; }
th, td { text-align:right; padding:9px 10px; border-bottom:1px solid var(--grid); white-space:nowrap; }
th:first-child, td:first-child { text-align:left; }
th { color:var(--ink-3); font-weight:500; font-size:var(--t-cap); text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--surface-1); z-index:1; }
th.sorted { color:var(--ink-1); font-weight:650; }
td { font-variant-numeric:tabular-nums; }
td.name { max-width:340px; overflow:hidden; text-overflow:ellipsis; text-align:left; }
/* copyable / expandable ad names (click a name -> code-block popover + copy) */
.copyname { position:relative; cursor:pointer; }
td.name.copyname { padding-right:20px; }
.copyname .copyglyph { position:absolute; right:5px; top:8px; font-size:12px; line-height:1;
  color:var(--ink-3); opacity:0.4; transition:opacity .12s, color .12s; }
.copyname:hover .copyglyph { opacity:1; color:var(--st-good); }
.namepop { position:fixed; z-index:60; width:min(560px,92vw); background:var(--surface-1);
  border:1px solid var(--border); border-radius:var(--r-s); box-shadow:var(--shadow); padding:12px; }
.namepop-h { font-size:var(--t-cap); color:var(--ink-3); margin-bottom:7px;
  text-transform:uppercase; letter-spacing:0.05em; }
.namepop-box { max-height:230px; overflow:auto; background:var(--wash);
  border:1px solid var(--grid); border-radius:var(--r-s); padding:9px 11px; }
.namecode { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12.5px;
  line-height:1.6; color:var(--ink-2); white-space:pre-wrap; word-break:break-all; user-select:text; }
.namecode .nsep { color:var(--ink-3); opacity:0.45; }
.namecode .nfile { color:var(--ink-1); font-weight:700; background:var(--wash-good);
  border-radius:3px; padding:0 2px; }
.namepop-row { display:flex; gap:8px; margin-top:11px; }
.namepop-btn { font:inherit; font-size:13px; font-weight:700; padding:8px 14px; border-radius:var(--r-s);
  border:none; background:var(--lime); color:var(--pine); cursor:pointer; }
.namepop-btn:hover { filter:brightness(0.95); }
.namepop-x { font:inherit; font-size:13px; padding:8px 12px; border-radius:var(--r-s);
  border:1px solid var(--border); background:transparent; color:var(--ink-2); cursor:pointer; }
.toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(12px);
  background:var(--ink-1); color:var(--surface-1); font-size:13px; font-weight:650; padding:9px 17px;
  border-radius:100px; box-shadow:var(--shadow); opacity:0; pointer-events:none; z-index:70;
  transition:opacity .16s ease, transform .16s ease; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
td .pdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
tr:hover td { background:var(--wash); }
td.num { font-variant-numeric:tabular-nums; }
td.guide { text-align:left; color:var(--ink-2); font-size:var(--t-sm); white-space:normal; min-width:150px; }
.badge { display:inline-flex; align-items:center; gap:5px; font-size:var(--t-cap); padding:2px 8px; border-radius:100px; border:1px solid var(--border); color:var(--ink-2); font-weight:600; }
.badge .dot { width:6px; height:6px; border-radius:50%; }
.b-scale { color:var(--st-good); border-color:var(--st-good); } .b-scale .dot { background:var(--st-good); }
.b-goal .dot { background:var(--st-good); }
.b-watch .dot { background:var(--st-warn); }
.b-fix { color:var(--st-crit); border-color:var(--st-crit); } .b-fix .dot { background:var(--st-crit); }
.b-na .dot { background:var(--ink-3); }
.roascell { font-weight:650; }
.tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.chg-hidden { display:none !important; }
.chg-more { background:none; border:none; padding:var(--s2) 0 0; font:inherit; font-size:var(--t-sm); font-weight:650; color:var(--ink-1); cursor:pointer; }

/* ---- section divider --------------------------------------------------- */
.section-h { display:flex; align-items:baseline; gap:10px; margin:var(--s6) 0 var(--s3); }
.section-h h2 { font-family:var(--f-display); font-size:15px; margin:0; letter-spacing:-0.01em; color:var(--ink-1); text-transform:none; font-weight:700; }
.section-h .sub { font-size:var(--t-sm); }

/* ---- insights lists ----------------------------------------------------- */
.insights { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s3); }
.insights ul, ul.insights { margin:0; padding-left:0; list-style:none; }
.insights li, ul.insights li { padding:9px 0 9px 20px; position:relative; border-bottom:1px solid var(--grid); font-size:14px; }
.insights li:last-child, ul.insights li:last-child { border-bottom:none; }
.insights li::before, ul.insights li::before { content:""; position:absolute; left:2px; top:14px; width:7px; height:7px; border-radius:50%; }
li.sev-good::before { background:var(--st-good); }
li.sev-warn::before { background:var(--st-warn); }
li.sev-bad::before { background:var(--st-crit); }
li.sev-info::before { background:var(--ink-3); }
.ctx li::before { background:var(--ink-3); }
.ctx .d { color:var(--ink-3); font-size:var(--t-cap); margin-right:6px; }
details summary { cursor:pointer; color:var(--ink-2); font-size:14px; font-weight:600; padding:4px 0; }
footer { color:var(--ink-3); font-size:var(--t-sm); margin-top:var(--s5); }
footer li { margin:3px 0; }

/* ---- widgets ------------------------------------------------------------ */
.wrow { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s3); margin-bottom:var(--s4); }
.widget { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4); box-shadow:var(--shadow); }
.widget h3 { margin:0 0 var(--s3); font-family:var(--f-ui); font-size:var(--t-cap); letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-3); font-weight:650; }
.mixbar { display:flex; height:10px; border-radius:6px; overflow:hidden; gap:2px; background:var(--grid); }
.mixbar > div { height:100%; }
.mixlegend { margin-top:var(--s3); }
.mixlegend .row { display:flex; align-items:center; gap:8px; font-size:var(--t-sm); padding:3px 0; color:var(--ink-2); }
.mixlegend .sw { width:9px; height:9px; border-radius:3px; flex:none; }
.mixlegend .v { margin-left:auto; font-variant-numeric:tabular-nums; color:var(--ink-1); font-weight:600; }
/* goal track: 30 daily bars vs goal */
.gtrack { display:flex; align-items:flex-end; gap:2px; height:44px; margin-top:var(--s1); position:relative; }
.gtrack .gline { position:absolute; left:0; right:0; border-top:1.5px dashed var(--axis); pointer-events:none; }
.gtrack i { flex:1; min-width:2px; border-radius:2px 2px 0 0; background:var(--grid); }
.gtrack i.above { background:var(--st-good); }
.gtrack i.below { background:var(--grid); }
.gtrack i.below.recent { background:color-mix(in srgb, var(--st-warn) 35%, transparent); }
.gtrack-cap { font-size:var(--t-sm); color:var(--ink-2); margin-top:var(--s2); }
.gtrack-cap b { color:var(--ink-1); font-variant-numeric:tabular-nums; }
.callout { display:flex; gap:9px; padding:var(--s2) 0; border-bottom:1px solid var(--grid); font-size:14px; align-items:baseline; }
.callout:last-child { border-bottom:none; }
.callout .cdot { width:7px; height:7px; border-radius:50%; flex:none; align-self:center; }

/* ---- funnel (v11): stage bars + between-stage conversion rates ---------- */
.funnel-head { display:flex; align-items:center; gap:var(--s3); flex-wrap:wrap; margin-bottom:var(--s3); }
.funnel-head h2 { margin:0; }
.funnel-head .seg { margin-left:auto; }
/* tornado funnel: labels left, smooth mirrored shape center, transition chips right */
.tfun { display:grid; grid-template-columns:104px minmax(0,1fr) 150px; gap:0 var(--s3); align-items:start; }
.tfun svg { display:block; width:100%; }
.tfun .tlabs .tl { height:var(--tfrow); display:flex; flex-direction:column; justify-content:center; font-size:var(--t-cap); color:var(--ink-2); line-height:1.25; }
.tfun .tlabs .tl b { color:var(--ink-1); font-weight:650; font-size:17px; font-variant-numeric:tabular-nums; }
.tfun .tdrops { padding-top:calc(var(--tfrow) / 2); }
.tfun .tdrops .td0 { height:var(--tfrow); display:flex; flex-direction:column; justify-content:center; gap:2px; font-size:var(--t-cap); color:var(--ink-3); }
.tfun .tdrops .td0 b { color:var(--ink-1); font-weight:650; font-size:var(--t-sm); font-variant-numeric:tabular-nums; }
.tfun .tdrops .td0.leak b { color:var(--st-crit); }
.rchip { display:inline-block; font-size:var(--t-cap); font-weight:650; font-variant-numeric:tabular-nums; padding:1px 7px; border-radius:99px; white-space:nowrap; align-self:flex-start; }
.rchip.up { color:var(--delta-good); background:var(--wash-good); }
.rchip.down { color:var(--delta-bad); background:var(--wash-bad); }
.rchip.flat { color:var(--ink-3); background:var(--wash); }
.fsub { font-size:var(--t-cap); color:var(--ink-3); margin-top:var(--s3); }

/* ---- v12 vertical purchase funnel -------------------------------------- */
.funnelcard .chead .srcpill { float:right; margin-left:var(--s3); }
.srcpill { display:inline-block; font-size:var(--t-cap); font-weight:600; color:var(--ink-3);
  border:1px solid var(--border); border-radius:99px; padding:2px 10px; white-space:nowrap; }
.vfun { display:grid; grid-template-columns:118px minmax(0,240px) 176px; gap:0 var(--s3); align-items:start;
  margin:var(--s2) auto 0; max-width:600px; justify-content:center; }
.vfun svg { display:block; width:100%; }
.vfun .vlabs .vl { height:var(--vfrow); display:flex; flex-direction:column; justify-content:center;
  font-size:var(--t-cap); color:var(--ink-2); line-height:1.2; }
.vfun .vlabs .vl b { color:var(--ink-1); font-weight:700; font-size:20px; font-variant-numeric:tabular-nums;
  font-family:var(--f-display); letter-spacing:-0.01em; }
.vfun .vdrops { padding-top:calc(var(--vfrow) / 2); }
.vfun .vdrops .vd0 { height:var(--vfrow); display:flex; flex-direction:column; justify-content:center; gap:3px;
  font-size:var(--t-cap); color:var(--ink-3); line-height:1.2; }
.vfun .vdrops .vd0 b { color:var(--ink-1); font-weight:650; font-size:var(--t-sm); font-variant-numeric:tabular-nums; }
.vfun .vdrops .vd0.leak b { color:var(--st-crit); }
@media (max-width:520px) {
  .vfun { grid-template-columns:92px minmax(0,1fr) 132px; }
  .vfun .vlabs .vl b { font-size:17px; }
}
.funnelseg { font-size:var(--t-cap); }
.funnelcard .vfun-body { clear:both; }
.fscope { text-align:center; font-size:var(--t-cap); color:var(--ink-3); margin-top:var(--s3);
  border:1px solid var(--border); border-radius:99px; padding:3px 12px; display:inline-block;
  position:relative; left:50%; transform:translateX(-50%); }
.dgctx { margin-top:var(--s3); padding:var(--s3); border-radius:var(--r-s); background:var(--wash);
  border:1px solid var(--border); font-size:var(--t-sm); color:var(--ink-2); line-height:1.45; }
.dgctx b { color:var(--ink-1); font-weight:650; }

/* ---- global Demand Gen toggle: sidebar control + mode banner + tile chip ---- */
.sb-ctl { display:grid; gap:6px; }
.sb-ctl-l { font-size:var(--t-cap); letter-spacing:0.06em; text-transform:uppercase;
  color:var(--bar-ink-2); font-weight:650; }
.sb-seg { background:transparent; border-color:var(--bar-line); }
.sb-seg button { color:var(--bar-ink-2); border-right-color:var(--bar-line); padding:6px 12px; font-size:var(--t-sm); }
.sb-seg button:hover { color:var(--bar-ink); }
.sb-seg button[aria-pressed="true"] { color:var(--on-accent); background:var(--lime); font-weight:650; }
/* mode banner — shown only when DG is folded in */
.dgmode { display:flex; align-items:center; gap:8px; margin:0 0 var(--s3);
  padding:8px 12px; border-radius:var(--r-s); background:var(--wash);
  border:1px solid var(--border); font-size:var(--t-sm); color:var(--ink-2); line-height:1.4; }
.dgmode b { color:var(--ink-1); font-weight:650; }
.dgmode-dot { width:8px; height:8px; border-radius:50%; background:var(--lime); flex:none;
  outline:1px solid rgba(11,16,21,0.12); }
/* "incl DG" chip on the headline ROAS tile */
.dgchip { display:inline-flex; align-items:center; font-size:var(--t-cap); font-weight:650;
  padding:1px 7px; border-radius:100px; background:var(--surface-2); color:var(--ink-2);
  border:1px solid var(--border); text-transform:uppercase; letter-spacing:0.05em;
  white-space:nowrap; flex:none; align-self:flex-start; }

/* cockpit hero row: trends beside funnel, reference-style */
.cockrow { display:grid; grid-template-columns:minmax(0,3fr) minmax(0,2fr); gap:var(--s4); margin-bottom:var(--s4); align-items:stretch; }
.cockrow > .card { margin-bottom:0; }
@media (max-width: 980px) { .cockrow { grid-template-columns:1fr; } }

/* card head: sentence-case title + quiet subtitle (major cards) */
.chead { margin-bottom:var(--s3); }
.chead .ct { font-family:var(--f-display); font-size:16px; font-weight:650; letter-spacing:-0.01em; color:var(--ink-1); }
.chead .cs { font-size:var(--t-sm); color:var(--ink-3); margin-top:2px; }
.chead .seg { float:right; margin-left:var(--s3); }

/* stat row under the trend chart */
.chstats { display:grid; grid-template-columns:repeat(auto-fit,minmax(118px,1fr)); gap:var(--s3); border-top:1px solid var(--grid); margin-top:var(--s3); padding-top:var(--s3); }
.chstats .cs-l { font-size:var(--t-cap); color:var(--ink-3); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; }
.chstats .cs-v { font-size:19px; font-weight:650; color:var(--ink-1); margin-top:2px; }
.chstats .cs-v .delta { display:inline-block; margin-left:8px; }

/* donut (spend mix) */
.donutwrap { display:flex; gap:var(--s4); align-items:center; }
.donutwrap .mixlegend { flex:1; margin-top:0; }

/* tile sparkline */
.tile .spark { margin-top:var(--s2); }
.tile .spark svg { display:block; width:100%; height:34px; }

@media (max-width: 560px) {
  .tfun { grid-template-columns:88px minmax(0,1fr) 118px; }
  .tfun .tlabs .tl b { font-size:15px; }
}

/* ---- data health (v11) -------------------------------------------------- */
.dhstrip { display:flex; align-items:center; gap:var(--s3); flex-wrap:wrap; font-size:var(--t-sm); color:var(--ink-2); }
.dhstrip .dh-label { font-size:var(--t-cap); letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-3); font-weight:650; }
.dhstrip .dh-src { display:inline-flex; align-items:center; gap:6px; }
.dhstrip .dh-dot { width:8px; height:8px; border-radius:50%; flex:none; }
.dhstrip a { color:inherit; margin-left:auto; font-size:var(--t-cap); }
.integ table { width:100%; border-collapse:collapse; font-size:var(--t-sm); }
.integ th { text-align:left; font-size:var(--t-cap); color:var(--ink-3); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; padding:6px 10px 6px 0; border-bottom:1px solid var(--border); }
.integ th, .integ td { text-align:left; }
.integ td { padding:8px 10px 8px 0; border-bottom:1px solid var(--grid); vertical-align:top; color:var(--ink-2); font-variant-numeric:tabular-nums; }
.integ td:first-child { color:var(--ink-1); font-weight:600; white-space:nowrap; }
.integ .ichip { display:inline-block; font-size:var(--t-cap); font-weight:650; padding:1px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:0.04em; }
.integ .ichip.ok { color:var(--st-good); background:var(--wash-good); }
.integ .ichip.cache { color:var(--st-warn); background:var(--wash-warn); }
.integ .ichip.bad { color:var(--st-crit); background:var(--wash-bad); }
.divrow { margin:var(--s2) 0 var(--s3); }
.divrow .dl { display:flex; justify-content:space-between; font-size:var(--t-sm); color:var(--ink-2); margin-bottom:3px; }
.divrow .dl b { color:var(--ink-1); font-variant-numeric:tabular-nums; }
.divrow .dbar { height:12px; border-radius:0 3px 3px 0; min-width:3px; margin-bottom:3px; }
.divrow .dbar.claim { background:var(--wash); border:1px dashed var(--ink-3); }
.divrow .dbar.nb { background:var(--pine); }
:root[data-theme="dark"] .divrow .dbar.nb { background:var(--bk-core); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .divrow .dbar.nb { background:var(--bk-core); } }

/* ---- brand eyebrow (v11) ------------------------------------------------- */
.eyebrow { font-size:11px; letter-spacing:0.09em; text-transform:uppercase; color:var(--ink-3); font-weight:650; display:flex; align-items:center; gap:8px; }
.eyebrow::before { content:""; width:14px; height:3px; background:var(--lime); border-radius:2px;
  outline:1px solid rgba(11,16,21,0.08); }
.mult-chip { display:inline-block; padding:1px 8px; border-radius:100px; font-weight:650; font-size:var(--t-sm); background:var(--surface-2); font-variant-numeric:tabular-nums; }

/* ---- takeaways ----------------------------------------------------------- */
.takeaway { display:flex; gap:8px; align-items:baseline; font-size:14px; font-weight:600; color:var(--ink-1); margin:0 0 var(--s3); }
.takeaway::before { content:""; width:7px; height:7px; border-radius:50%; flex:none; align-self:center; background:var(--ink-3); }
.takeaway.tk-good::before { background:var(--st-good); }
.takeaway.tk-warn::before { background:var(--st-warn); }
.takeaway.tk-bad::before { background:var(--st-crit); }
.roasbar { display:inline-block; width:44px; height:4px; border-radius:100px; background:var(--grid); margin-left:7px; vertical-align:2px; overflow:hidden; }
.roasbar > i { display:block; height:100%; border-radius:100px; }

/* ---- cockpit nav cards ----------------------------------------------------- */
.navcards { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:var(--s3); margin-bottom:var(--s4); }
.ncard { display:block; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4); text-decoration:none; color:var(--ink-1); transition:border-color .15s; box-shadow:var(--shadow); }
.ncard:hover { border-color:var(--pine); }
:root[data-theme="dark"] .ncard:hover { border-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .ncard:hover { border-color:var(--lime); } }
.nc-title { font-family:var(--f-display); font-weight:700; font-size:15px; letter-spacing:-0.01em; }
.nc-teaser { color:var(--ink-3); font-size:var(--t-sm); margin-top:var(--s1); }
.morelink { display:block; margin-top:var(--s2); font-size:var(--t-sm); font-weight:650; color:inherit; }

/* ---- testing monitor ----------------------------------------------------- */
.tchip { display:inline-flex; align-items:center; gap:5px; font-size:var(--t-cap); padding:2px 9px; border-radius:100px; border:1px solid var(--border); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
.tchip .dot { width:6px; height:6px; border-radius:50%; }
.t-graduate { color:var(--st-good); border-color:var(--st-good); } .t-graduate .dot { background:var(--st-good); }
.t-kill { color:var(--st-crit); border-color:var(--st-crit); } .t-kill .dot { background:var(--st-crit); }
.t-final_stretch { color:var(--st-warn); } .t-final_stretch .dot { background:var(--st-warn); }
.t-early_signal { color:var(--st-good); } .t-early_signal .dot { background:var(--st-good); }
.t-in_test { color:var(--ink-2); } .t-in_test .dot { background:var(--ink-3); }
.meter { width:120px; height:6px; border-radius:100px; background:var(--grid); overflow:hidden; }
.meter > div { height:100%; border-radius:100px; }
td.action { text-align:left; white-space:normal; min-width:220px; max-width:330px; color:var(--ink-2); font-size:var(--t-sm); }

/* ---- creative intelligence ----------------------------------------------- */
.vchip { display:inline-flex; align-items:center; gap:4px; font-size:var(--t-cap); padding:1px 8px; border-radius:100px; border:1px solid var(--border); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; }
.vchip.lean_in { color:var(--st-good); border-color:var(--st-good); }
.vchip.cut { color:var(--st-crit); border-color:var(--st-crit); }
.vchip.iterate { color:var(--ink-2); }
.vchip.low_data { color:var(--ink-3); }
.ci-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s4); }
.ci-lists { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s3); margin-top:var(--s4); }
.comp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:var(--s3); }
.comp-card { border:1px solid var(--border); border-radius:var(--r-s); padding:var(--s3) var(--s4); }
.comp-card h4 { margin:0 0 2px; font-family:var(--f-display); font-size:14px; }
.comp-card .cat { color:var(--ink-3); font-size:var(--t-cap); margin-bottom:6px; }
.comp-card .angles { display:flex; flex-wrap:wrap; gap:4px; margin:6px 0; }
.comp-card .angles span { font-size:var(--t-cap); border:1px solid var(--border); border-radius:100px; padding:1px 8px; color:var(--ink-2); }
.comp-card .mirror { font-size:var(--t-sm); color:var(--ink-1); margin-top:6px; }
.comp-card .mirror::before { content:"Mirror: "; font-weight:650; color:var(--ink-2); }
.comp-thumbs { display:flex; gap:6px; margin-top:var(--s2); }
.comp-thumbs img { height:74px; border-radius:6px; border:1px solid var(--border); object-fit:cover; }
.comp-proven { font-size:var(--t-cap); color:var(--ink-3); margin-top:4px; }
.gapbox { border:1px solid var(--border); border-left:3px solid var(--pine); border-radius:var(--r-s); padding:var(--s3) var(--s4); margin-top:var(--s4); }
:root[data-theme="dark"] .gapbox { border-left-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .gapbox { border-left-color:var(--lime); } }
.gapbox ul { margin:4px 0 0; padding-left:18px; font-size:14px; color:var(--ink-2); }
.gapbox li { margin:5px 0; }
.creative { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s4); }

/* ---- filters ------------------------------------------------------------- */
.filters { display:flex; flex-wrap:wrap; gap:var(--s2); align-items:center; margin-bottom:var(--s3); }
/* ---- delivery (active/inactive) status pills + summary -------------------- */
.dlvpill { display:inline-block; margin-right:6px; padding:1px 7px; border-radius:100px; font-size:var(--t-cap); font-weight:650; letter-spacing:0.03em; vertical-align:middle; font-variant-numeric:tabular-nums; white-space:nowrap; }
.dlvpill.dlv-on   { color:var(--st-good); background:var(--wash-good); }
.dlvpill.dlv-idle { color:var(--st-warn); background:var(--wash-warn); }
.dlvpill.dlv-off  { color:var(--ink-3); background:var(--wash); }
.dlvpill.dlv-del  { color:var(--ink-3); background:var(--wash); opacity:0.7; text-decoration:line-through; }
.dlvpill.dlv-unk  { color:var(--ink-3); background:var(--wash); }
.dlvsum { font-size:var(--t-sm); margin-bottom:var(--s2); }
.dlvsum-on  { color:var(--st-good); font-weight:650; }
.dlvsum-off { color:var(--ink-2); font-weight:650; }
.seg { display:inline-flex; border:1px solid var(--border); border-radius:var(--r-s); overflow:hidden; background:var(--surface-1); }
.seg button { background:none; border:none; padding:7px 14px; font:inherit; font-size:14px; color:var(--ink-2); cursor:pointer; border-right:1px solid var(--border); }
.seg button:last-child { border-right:none; }
.seg button[aria-pressed="true"] { color:var(--ink-1); font-weight:650; background:var(--surface-2); }
input.search { background:var(--surface-1); color:var(--ink-1); border:1px solid var(--border); border-radius:var(--r-s); padding:7px 12px; font:inherit; font-size:14px; width:220px; }
.maturity-note { font-size:var(--t-sm); color:var(--ink-3); margin-top:var(--s1); }

/* ---- unlock ---------------------------------------------------------------- */
#lock { max-width:360px; width:calc(100% - 32px); margin:18vh auto; text-align:center; }
#lock .wordmark { color:var(--pine); }
:root[data-theme="dark"] #lock .wordmark { color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) #lock .wordmark { color:var(--lime); } }
#lock input { width:100%; padding:10px 12px; font:inherit; border:1px solid var(--border); border-radius:var(--r-s); background:var(--surface-1); color:var(--ink-1); margin:var(--s4) 0 10px; }
#lock button { width:100%; padding:11px; font:inherit; font-weight:650; border:none; border-radius:var(--r-s); background:var(--pine); color:var(--lime); cursor:pointer; }
#lock .err { color:var(--st-crit); font-size:14px; min-height:18px; }
#app { display:none; }

/* ---- mobile ------------------------------------------------------------------ */
@media (max-width:720px){
  .wrap { padding:var(--s3) max(12px, env(safe-area-inset-right)) var(--s7) max(12px, env(safe-area-inset-left)); }
  input.search, #lock input { font-size:16px; }
  .card { padding:var(--s3); border-radius:var(--r-s); }
  .pagehead { margin:var(--s4) 0 var(--s2); }
  .tiles { grid-template-columns:repeat(2, 1fr); gap:var(--s2); }
  .tile { padding:var(--s3); }
  .tile .val { font-size:26px; }
  .tile svg { max-width:100%; }
  td.name { max-width:160px; }
  th, td { padding:8px 8px; font-size:var(--t-sm); }
  .seg button { padding:6px 10px; }
  .tscroll th:first-child, .tscroll td:first-child { position:sticky; left:0; background:var(--surface-1); z-index:2; }
  .tscroll tr:hover td { background:var(--surface-1); }
  .insights { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="lock" class="card">
  <div class="lc-logo" aria-label="Lower Cross">LOWER<br>CROSS</div>
  <div id="lockform">
    <h1>TRX Dashboard</h1>
    <p class="sub">Enter the team passphrase to unlock.</p>
    <input id="pw" type="password" placeholder="Passphrase" autocomplete="current-password">
    <div class="err" id="pwerr"></div>
    <button id="unlock">Unlock</button>
  </div>
  <div id="lockload" style="display:none">
    <h1>TRX Dashboard</h1>
    <p class="sub">Unlocking…</p>
  </div>
</div>
<script>
// saved-pass sessions show a loading state, never a password-form flash
if (localStorage.getItem("uk_pass")) {
  document.getElementById("lockform").style.display = "none";
  document.getElementById("lockload").style.display = "block";
}
</script>

<div id="app" class="wrap"></div>

<script>
"use strict";
/* ---------- crypto ---------- */
async function deriveKey(pass, salt, iter) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:iter, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decryptEnvelope(env, pass) {
  const key = await deriveKey(pass, b64(env.salt), env.iter);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(env.iv)}, key, b64(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ---------- state ---------- */
let DATA = null;
const PAGE = "cockpit";
let winSel = "L7", platSel = PAGE === "creative" ? "meta" : "all",
    levelSel = PAGE === "creative" ? "ad" : "campaign";
let sortCol = "spend", sortDir = -1, query = "", showZero = false, minRoasOn = false;
// delivery filter: all | active | inactive. Active = Status "Active" AND spend>0 in the window.
let deliverySel = "all";
// global Demand Gen (TOF) fold-in — persisted so it survives page nav (default: Excluded)
let inclDG = localStorage.getItem("trx_incl_dg") === "1";
// Bucket visibility for ALL performance surfaces. App/Amazon (other) is never a
// performance surface; Demand Gen (tof) is shown / folded into totals ONLY when
// the sidebar DG toggle is on. Every row list + spend/perf total routes through
// this so the toggle applies to all data, not just the headline tiles/chart.
function bucketVisible(bucket) {
  if (bucket === "other") return false;
  if (bucket === "tof") return inclDG;
  return true; // core, brand
}
const ROAS_FILTER = 1.75;  // testing graduation bar — "working" threshold
const PLAT_COLOR = { meta:"var(--s-meta)", google:"var(--s-google)", tiktok:"var(--s-tiktok)" };
const PLAT_LABEL = { meta:"Meta", google:"Google", tiktok:"TikTok" };
const fm$ = v => "$" + Math.round(v).toLocaleString("en-US");
const fmK = v => v >= 10000 ? "$" + (v/1000).toFixed(0) + "K" : fm$(v);
const fmR = v => v == null ? "–" : v.toFixed(2);
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

/* ---------- boot ---------- */
async function tryUnlock(pass) {
  const res = await fetch("data.enc", {cache:"no-store"});
  if (!res.ok) throw new Error("data.enc not found");
  DATA = await decryptEnvelope(JSON.parse(await res.text()), pass);
}
document.getElementById("unlock").addEventListener("click", go);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
async function go() {
  const pass = document.getElementById("pw").value.trim();
  if (!pass) return;
  try {
    await tryUnlock(pass);
    localStorage.setItem("uk_pass", pass);
    document.getElementById("lock").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } catch (e) {
    document.getElementById("pwerr").textContent = "Wrong passphrase (or data missing).";
  }
}
let lastW = window.innerWidth;
window.addEventListener("resize", () => {
  if (!DATA || Math.abs(window.innerWidth - lastW) < 40) return;
  lastW = window.innerWidth;
  render();
});
(async () => {
  const saved = localStorage.getItem("uk_pass");
  if (saved) {
    try {
      await tryUnlock(saved);
      document.getElementById("lock").style.display = "none";
      document.getElementById("app").style.display = "block";
      render();
    } catch (e) {
      localStorage.removeItem("uk_pass");
      // reveal the form only when the saved pass genuinely fails
      document.getElementById("lockload").style.display = "none";
      document.getElementById("lockform").style.display = "block";
    }
  }
})();

/* ---------- derived series ---------- */
// Buckets are aggregated over ALL platforms (not tiktok-filtered) so that the
// excl-DG rolling line reproduces the precomputed core numbers exactly, and the
// incl-DG line folds Demand Gen (tof) in on Clicks + Total Impact (mv_rev).
function dailySeries() {
  const by = {};
  for (const c of DATA.levels.campaign) {
    for (const d of c.daily) {
      const o = by[d.date] || (by[d.date] = {meta:0, google:0, tiktok:0,
                                             coreSpend:0, coreRev:0, tofSpend:0, tofMv:0,
                                             cbSpend:0, cbFtx:0, cbNv:0, cbVis:0,
                                             tofFtx:0, tofNv:0, tofVis:0});
      if (o[c.platform] != null) o[c.platform] += d.spend || 0;
      if (c.bucket === "core") { o.coreSpend += d.spend || 0; o.coreRev += d.rev7 || 0; }
      if (c.bucket === "tof") {
        o.tofSpend += d.spend || 0; o.tofMv += d.mv_rev || 0;
        o.tofFtx += d.ftx || 0; o.tofNv += d.nv || 0; o.tofVis += d.visits || 0;
      }
      if (c.bucket === "core" || c.bucket === "brand") {
        o.cbSpend += d.spend || 0; o.cbFtx += d.ftx || 0; o.cbNv += d.nv || 0; o.cbVis += d.visits || 0;
      }
    }
  }
  const days = Object.keys(by).sort().map(date => {
    const o = by[date];
    const rev = inclDG ? o.coreRev + o.tofMv : o.coreRev;
    const sp = inclDG ? o.coreSpend + o.tofSpend : o.coreSpend;
    return {date, ...o, roas: sp > 0 ? rev / sp : null};
  });
  // spend-weighted 7-day rolling ROAS — the line a buyer should read
  // (+ rolling CAC and new-visitor share for the tile sparklines; per-day ftx is too noisy).
  // excl: core only / core+brand. incl: folds in Demand Gen (tof) on modeled views.
  for (let i = 0; i < days.length; i++) {
    let cs = 0, cr = 0, ts = 0, tm = 0, cbs = 0, cbf = 0, cbn = 0, cbv = 0, tf = 0, tn = 0, tv = 0;
    for (let j = Math.max(0, i - 6); j <= i; j++) {
      cs += days[j].coreSpend; cr += days[j].coreRev;
      ts += days[j].tofSpend; tm += days[j].tofMv;
      cbs += days[j].cbSpend; cbf += days[j].cbFtx; cbn += days[j].cbNv; cbv += days[j].cbVis;
      tf += days[j].tofFtx; tn += days[j].tofNv; tv += days[j].tofVis;
    }
    const rRev = inclDG ? cr + tm : cr, rSp = inclDG ? cs + ts : cs;
    const caSp = inclDG ? cbs + ts : cbs, caFx = inclDG ? cbf + tf : cbf;
    const nvN = inclDG ? cbn + tn : cbn, nvV = inclDG ? cbv + tv : cbv;
    days[i].roll = i >= 6 && rSp > 0 ? rRev / rSp : null;
    days[i].cacRoll = i >= 6 && caFx > 0 ? caSp / caFx : null;
    days[i].nvRoll = i >= 6 && nvV > 0 ? nvN / nvV : null;
  }
  return days;
}

/* Demand Gen (TOF) global blend for the headline tiles + verdict. Reads inclDG.
   Sums by bucket over ALL platforms — excl core ROAS == summary.core_roas_l7 and
   incl CAC / new-visitor % reproduce the precomputed (tof-inclusive) values;
   excl cleanly removes Demand Gen. DG revenue uses mv_rev (Clicks + Modeled
   Views); DG first-time customers use deterministic ftx (MV gives revenue, not
   customer counts). */
function dgAgg(win) {
  let coreRev = 0, coreSpend = 0, tofMv = 0, tofSpend = 0,
      cbSpend = 0, cbFtx = 0, cbNv = 0, cbVis = 0, tofFtx = 0, tofNv = 0, tofVis = 0;
  for (const c of DATA.levels.campaign) {
    const w = c.windows[win];
    if (!w) continue;
    if (c.bucket === "core") { coreRev += w.rev7 || 0; coreSpend += w.spend || 0; }
    if (c.bucket === "tof") {
      tofMv += w.mv_rev || 0; tofSpend += w.spend || 0;
      tofFtx += w.ftx || 0; tofNv += w.nv || 0; tofVis += w.visits || 0;
    }
    if (c.bucket === "core" || c.bucket === "brand") {
      cbSpend += w.spend || 0; cbFtx += w.ftx || 0; cbNv += w.nv || 0; cbVis += w.visits || 0;
    }
  }
  const rev = inclDG ? coreRev + tofMv : coreRev;
  const spend = inclDG ? coreSpend + tofSpend : coreSpend;
  const caSp = inclDG ? cbSpend + tofSpend : cbSpend;
  const caFx = inclDG ? cbFtx + tofFtx : cbFtx;
  const nvN = inclDG ? cbNv + tofNv : cbNv;
  const nvV = inclDG ? cbVis + tofVis : cbVis;
  return {
    roas: spend > 0 ? rev / spend : null,
    cac: caFx > 0 ? caSp / caFx : null,
    ftx: caFx,
    nvPct: nvV > 0 ? nvN / nvV : null,
  };
}

/* ---------- svg helpers ---------- */
const SVG = "http://www.w3.org/2000/svg";
function sv(tag, attrs) {
  const n = document.createElementNS(SVG, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}
function sparkline(vals, w, h, goal) {
  const svg = sv("svg", {width:w, height:h, viewBox:`0 0 ${w} ${h}`});
  const nums = vals.filter(v => v != null);
  if (nums.length < 2) return svg;
  const max = Math.max(...nums, goal || 0) * 1.1 || 1;
  const pts = vals.map((v, i) => v == null ? null :
    [i / (vals.length - 1) * (w - 6) + 3, h - 3 - v / max * (h - 8)]);
  if (goal != null) {
    const gy = h - 3 - goal / max * (h - 8);
    svg.appendChild(sv("line", {x1:0, x2:w, y1:gy, y2:gy, stroke:"var(--axis)", "stroke-width":1, "stroke-dasharray":"3,3"}));
  }
  let d = "", st = false;
  pts.forEach(p => { if (!p) { st = false; return; }
    d += (st ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1); st = true; });
  svg.appendChild(sv("path", {d, fill:"none", stroke:"var(--seq-250)", "stroke-width":2, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  const last = [...pts].reverse().find(p => p);
  if (last) svg.appendChild(sv("circle", {cx:last[0], cy:last[1], r:4, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
  return svg;
}

/* ---------- main trend chart ---------- */
function trendChart(days) {
  const box = el("div", "chartbox");
  const appW = document.getElementById("app").clientWidth || 1000;
  const W = Math.min(1180, Math.max(300, appW - 40));
  const narrow = W < 520;
  const H1 = narrow ? 130 : 160, H2 = narrow ? 100 : 130, GAP = 26,
        padL = narrow ? 34 : 44, padR = narrow ? 8 : 14, AXH = 20;
  const H = H1 + GAP + H2 + AXH;
  const svg = sv("svg", {width:"100%", height:H, viewBox:`0 0 ${W} ${H}`, style:"display:block"});
  const n = days.length;
  const x = i => padL + (n === 1 ? 0 : i / (n - 1) * (W - padL - padR));
  const goal = DATA.meta.goal_roas;

  /* panel 1: daily (light) + rolling (bold) core ROAS */
  const allVals = days.flatMap(d => [d.roas, d.roll]).filter(v => v != null);
  const rmax = Math.max(goal * 1.3, ...allVals) * 1.08;
  const ry = v => H1 - 8 - (v / rmax) * (H1 - 22);
  [0, goal].forEach(v => {
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(v), y2:ry(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:ry(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = v.toFixed(1); svg.appendChild(t);
  });
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(goal), y2:ry(goal), stroke:"var(--axis)", "stroke-width":1.5, "stroke-dasharray":"5,4"}));
  const gt = sv("text", {x:W - padR, y:ry(goal) - 5, "text-anchor":"end", fill:"var(--ink-2)", "font-size":10.5, "font-weight":600});
  gt.textContent = "goal " + goal.toFixed(1); svg.appendChild(gt);
  if (n > 7) {
    svg.appendChild(sv("rect", {x:x(n - 7), y:8, width:x(n - 1) - x(n - 7), height:H1 - 16, fill:"var(--wash)"}));
  }
  const path = (get, stroke, width) => {
    let d = "", st = false;
    days.forEach((dd, i) => { const v = get(dd); if (v == null) { st = false; return; }
      d += (st ? "L" : "M") + x(i).toFixed(1) + "," + ry(v).toFixed(1); st = true; });
    svg.appendChild(sv("path", {d, fill:"none", stroke, "stroke-width":width, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  };
  path(d => d.roas, "var(--seq-250)", 1.5);
  path(d => d.roll, "var(--s-meta)", 2.5);
  const lastRollIdx = (() => { for (let i = n - 1; i >= 0; i--) if (days[i].roll != null) return i; return -1; })();
  if (lastRollIdx >= 0) {
    const v = days[lastRollIdx].roll;
    svg.appendChild(sv("circle", {cx:x(lastRollIdx), cy:ry(v), r:4.5, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
    const vt = sv("text", {x:x(lastRollIdx) - 8, y:ry(v) - 9, "text-anchor":"end", fill:"var(--ink-1)", "font-size":11.5, "font-weight":650});
    vt.textContent = v.toFixed(2); svg.appendChild(vt);
  }
  const p1t = sv("text", {x:padL, y:14, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p1t.textContent = narrow ? "Core ROAS" : "Core ROAS by day — read the bold 7-day line, not the daily wiggle";
  svg.appendChild(p1t);

  /* panel 2: stacked spend bars by channel */
  const top2 = H1 + GAP;
  const smax = Math.max(...days.map(d => d.meta + d.google + d.tiktok)) * 1.12 || 1;
  const sy = v => top2 + (H2 - 14) - (v / smax) * (H2 - 26);
  [Math.round(smax / 2000) * 1000].filter(v => v > 0).forEach(v => {
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(v), y2:sy(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:sy(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = "$" + (v / 1000) + "K"; svg.appendChild(t);
  });
  const bw = Math.min(24, Math.max(3, (W - padL - padR) / n - 2));
  const order = ["meta", "google", "tiktok"];
  days.forEach((d, i) => {
    let acc = 0;
    order.forEach(p => {
      const v = d[p]; if (!v) return;
      const y1 = sy(acc + v), y0 = sy(acc);
      svg.appendChild(sv("rect", {x:x(i) - bw / 2, y:y1 + (acc ? 1 : 0), width:bw,
        height:Math.max(0, y0 - y1 - 1), rx:3, fill:`var(--s-${p})`}));
      acc += v;
    });
  });
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(0), y2:sy(0), stroke:"var(--axis)", "stroke-width":1}));
  const p2t = sv("text", {x:padL, y:top2 + 4, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p2t.textContent = narrow ? "Daily spend (all buckets)" : "Daily spend by channel — all buckets (core + TOF + brand + support)";
  svg.appendChild(p2t);

  const step = Math.ceil(n / (narrow ? 5 : 8));
  days.forEach((d, i) => {
    if (i % step !== 0 && i !== n - 1) return;
    if (i !== n - 1 && x(n - 1) - x(i) < 34) return;
    const t = sv("text", {x:x(i), y:H - 4, "text-anchor":"middle", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = d.date.slice(5).replace("-", "/"); svg.appendChild(t);
  });

  box.appendChild(svg);
  const leg = el("div", "legend");
  const mkKey = (cls, color, label) => {
    const s = el("span"); const k = el("span", cls); k.style.background = color;
    s.appendChild(k); s.appendChild(document.createTextNode(label)); return s;
  };
  leg.appendChild(mkKey("keyline thick", "var(--s-meta)", "7-day rolling ROAS"));
  leg.appendChild(mkKey("keyline", "var(--seq-250)", "Daily ROAS"));
  order.forEach(p => leg.appendChild(mkKey("key", `var(--s-${p})`, PLAT_LABEL[p] + " spend")));
  const mw = el("span", "muted"); mw.textContent = "shaded = accrual still maturing"; leg.appendChild(mw);
  box.appendChild(leg);

  /* crosshair + tooltip */
  const ch = el("div", "crosshair"); ch.style.height = (H - AXH) + "px"; box.appendChild(ch);
  const tt = el("div", "tooltip"); box.appendChild(tt);
  svg.addEventListener("pointermove", ev => {
    const rect = svg.getBoundingClientRect();
    const scale = W / rect.width;
    const px = (ev.clientX - rect.left) * scale;
    let best = 0, bd = 1e9;
    for (let i = 0; i < n; i++) { const dd = Math.abs(x(i) - px); if (dd < bd) { bd = dd; best = i; } }
    const d = days[best];
    ch.style.left = (x(best) / scale) + "px"; ch.style.display = "block";
    tt.replaceChildren();
    tt.appendChild(el("div", "tt-date", d.date));
    const addRow = (color, label, val, line) => {
      const r = el("div", "row");
      const k = el("span", "key"); k.style.background = color; if (!line) { k.style.height = "8px"; k.style.borderRadius = "2px"; }
      r.appendChild(k); r.appendChild(el("span", null, label)); r.appendChild(el("span", "v", val));
      tt.appendChild(r);
    };
    addRow("var(--s-meta)", "7d rolling", d.roll == null ? "–" : d.roll.toFixed(2), true);
    addRow("var(--seq-250)", "Daily ROAS", d.roas == null ? "–" : d.roas.toFixed(2), true);
    order.forEach(p => addRow(`var(--s-${p})`, PLAT_LABEL[p], fm$(d[p] || 0)));
    addRow("var(--axis)", "Total spend", fm$(d.meta + d.google + d.tiktok));
    tt.style.display = "block";
    const ttw = tt.offsetWidth;
    const lx = x(best) / scale;
    tt.style.left = Math.min(Math.max(lx + 12, 0), rect.width - ttw - 4) + "px";
    tt.style.top = "30px";
    if (lx + 12 + ttw > rect.width) tt.style.left = (lx - ttw - 12) + "px";
  });
  svg.addEventListener("pointerleave", () => { ch.style.display = "none"; tt.style.display = "none"; });
  return box;
}

/* ---------- tables (shared with v1) ---------- */
function statusBadge(e) {
  const goal = DATA.meta.goal_roas;
  if (e.platform === "tiktok") return ["b-na", "TikTok — broken"];
  if (e.bucket === "tof") return ["b-na", "TOF"];
  if (e.bucket === "brand") return ["b-na", "Brand"];
  if (e.bucket === "other") return ["b-na", "App / Amazon"];
  if (/zombie/i.test(e.campaign_name || "")) return ["b-na", "Zombie pen"];
  const w = e.windows[winSel === "L1" ? "L7" : winSel];
  if (!w || (w.spend || 0) < 250 || w.roas7 == null) return ["b-na", "Low data"];
  if (w.roas7 >= goal * 1.2) return ["b-scale", "Scale ↑"];
  if (w.roas7 >= goal) return ["b-goal", "On goal"];
  if (w.roas7 >= 1.5) return ["b-watch", "Watch"];
  return ["b-fix", "Fix / cut"];
}
// --- delivery status (distinct from the performance verdict above) ------------
// "Active" = the ad's Triple Whale config status is Active AND it actually spent in
// the selected window. Everything else is inactive: Paused/Deleted, or enabled
// but $0 in the window ("Idle" — on but not delivering).
function isActive(e) {
  return (e.status || "") === "Active" && (e.windows[winSel].spend || 0) > 0;
}
function deliveryBadge(e) {
  const st = e.status || "";
  const spend = e.windows[winSel].spend || 0;
  if (st === "Active" && spend > 0) return ["dlv-on", "Active"];
  if (st === "Active")             return ["dlv-idle", "Idle"];    // enabled, $0 in window
  if (st === "Paused")             return ["dlv-off", "Paused"];
  if (st === "Deleted")            return ["dlv-del", "Deleted"];
  return ["dlv-unk", st || "Unknown"];
}
function entityName(e) {
  if (levelSel === "campaign") return e.campaign_name || e.campaign_id;
  if (levelSel === "adset") return (e.adset_name || e.adset_id);
  return (e.ad_name || e.ad_id);
}
function entitySub(e) {
  if (levelSel === "campaign") return "";
  if (levelSel === "adset") return e.campaign_name;
  return e.campaign_name + " · " + (e.adset_name || "");
}
function renderTable(container) {
  container.replaceChildren();
  const goal = DATA.meta.goal_roas;
  /* App/Amazon: budget managed per the client sheet, performance not judged here */
  let rows = DATA.levels[levelSel].filter(e => bucketVisible(e.bucket))
    .filter(e => platSel === "all" || e.platform === platSel);
  if (query) {
    const q = query.toLowerCase();
    rows = rows.filter(e => (entityName(e) + " " + entitySub(e)).toLowerCase().includes(q));
  }
  const W = winSel;
  // active/inactive split over the current scope (computed before the delivery filter)
  const nActive = rows.filter(isActive).length;
  const nInactive = rows.length - nActive;
  if (deliverySel === "active") rows = rows.filter(isActive);
  else if (deliverySel === "inactive") rows = rows.filter(e => !isActive(e));
  // $0-spend hide applies only in the default (All) view; the Inactive view
  // intentionally keeps paused/idle rows that had $0 spend in the window.
  const preZero = rows.length;
  if (!showZero && deliverySel === "all") rows = rows.filter(e => (e.windows[W].spend || 0) > 0);
  const zeroHidden = preZero - rows.length;
  // active/inactive summary for the current level + platform + search scope
  {
    const noun = levelSel === "ad" ? "ads" : levelSel === "adset" ? "ad sets" : "campaigns";
    const sumEl = el("div", "dlvsum");
    sumEl.appendChild(el("span", "dlvsum-on", nActive + " active"));
    sumEl.appendChild(document.createTextNode(" · "));
    sumEl.appendChild(el("span", "dlvsum-off", nInactive + " inactive"));
    sumEl.appendChild(document.createTextNode(" " + noun + " "));
    sumEl.appendChild(el("span", "muted", "(Status Active + spend in " + W + ")"));
    container.appendChild(sumEl);
  }
  // threshold judges on the >=7d window even in the Yesterday view (L1 accrual
  // is too immature to threshold on), same mapping the status badges use
  const preRoas = rows.length;
  if (minRoasOn) rows = rows.filter(e => {
    const w = e.windows[W === "L1" ? "L7" : W];
    if (!w) return false;
    /* judge each row on its own model: DG (tof) on modeled views, rest on deterministic */
    const r = e.bucket === "tof" && w.mv_roas != null ? w.mv_roas : w.roas7;
    return r != null && r >= ROAS_FILTER;
  });
  const roasHidden = preRoas - rows.length;
  const get = {
    name: e => entityName(e).toLowerCase(),
    spend: e => e.windows[W].spend || 0,
    roas: e => e.windows[W].roas7 ?? -1,
    rev: e => e.windows[W].rev7 || 0,
    txns: e => e.windows[W].txns || 0,
    proas: e => e.windows[W].p_roas ?? -1,
    hook: e => {
      const w = e.windows[W];
      const isVideo = !/static|image|carousel/i.test(e.ad_name || "");
      return isVideo && (w.impressions || 0) >= 1000 && (w.video3s || 0) >= 100
        ? w.video3s / w.impressions : -1;
    },
    delta: e => {
      const a = e.windows.L7.roas7, b = e.windows.P7.roas7;
      return (a != null && b) ? (a - b) / b : -99;
    },
  };
  rows.sort((a, b) => {
    const va = get[sortCol](a), vb = get[sortCol](b);
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  const cols = [
    ["name", "Name"], ["spend", "Spend"], ["roas", "ROAS"], ["rev", "Rev"],
    ["txns", "Txns"], ["proas", "Platform ROAS"],
    ...(levelSel === "ad" ? [["hook", "Hook"]] : []),
    ["delta", "Δ WoW"], ["trend", "14d trend"], ["st", "Status"],
  ];
  const table = el("table");
  const thead = el("thead"); const trh = el("tr");
  cols.forEach(([id, label]) => {
    const th = el("th", sortCol === id ? "sorted" : null, label + (sortCol === id ? (sortDir < 0 ? " ↓" : " ↑") : ""));
    if (id === "hook") th.title = "Meta hook rate: 3-second video plays / impressions. <20% = weak opening, >=30% = strong.";
    if (id === "roas" || id === "rev") th.title = "Triple Whale attributed — Triple Attribution (clicks + deterministic), 7-day.";
    if (id === "proas") th.title = "Platform-reported (Google Ads API; Meta via NB's Meta integration at 7d-click/1d-view). Direction only.";
    if (!["trend", "st"].includes(id)) th.addEventListener("click", () => {
      if (sortCol === id) sortDir *= -1; else { sortCol = id; sortDir = -1; }
      renderTable(container);
    });
    trh.appendChild(th);
  });
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = el("tbody");
  const shown = rows.slice(0, 60);
  const maxSp = Math.max(...shown.map(e => e.windows[W].spend || 0), 1);
  for (const e of shown) {
    const w = e.windows[W];
    const tr = el("tr");
    const nameTd = el("td", "name");
    const pd = el("span", "pdot"); pd.style.background = PLAT_COLOR[e.platform] || "var(--s-other)";
    nameTd.appendChild(pd);
    // delivery pill goes BEFORE the (long, ellipsis-truncated) name so it's always
    // visible; only inactive rows get one — active rows stay clean.
    if (!isActive(e)) {
      const [dc, dl] = deliveryBadge(e);
      const dp = el("span", "dlvpill " + dc, dl);
      dp.title = "Delivery status: " + (e.status || "unknown")
        + " · " + ((e.windows[W].spend || 0) > 0 ? fm$(e.windows[W].spend) + " spent in " + W : "$0 in " + W);
      nameTd.appendChild(dp);
    }
    nameTd.appendChild(document.createTextNode(entityName(e)));
    if (entitySub(e)) { const s = el("div", "muted"); s.style.fontSize = "13px"; s.textContent = entitySub(e); nameTd.appendChild(s); }
    nameTd.title = entityName(e) + (entitySub(e) ? " — " + entitySub(e) : "") + " · NB: " + (e.status || "unknown");
    copyableName(nameTd, entityName(e));
    tr.appendChild(nameTd);
    {
      /* reference-style data bar behind the spend value */
      const sp = el("td", "num spendcell", fm$(w.spend || 0));
      const pct = Math.round((w.spend || 0) / maxSp * 100);
      sp.style.background = `linear-gradient(90deg, var(--wash) ${pct}%, transparent ${pct}%)`;
      tr.appendChild(sp);
    }
    const rc = el("td", "num roascell", fmR(w.roas7));
    if (w.roas7 != null && (w.spend || 0) >= 100 && e.bucket === "core" && e.platform !== "tiktok") {
      rc.style.color = w.roas7 >= goal ? "var(--st-good)" : (w.roas7 >= 1.5 ? "inherit" : "var(--st-crit)");
      rc.appendChild(roasBar(w.roas7, goal));
    }
    if (e.bucket === "tof" && w.mv_roas != null) {
      /* DG is judged on Clicks + Total Impact — deterministic undercounts it */
      const mv = el("span", "mult-chip", "MV " + w.mv_roas.toFixed(2));
      mv.style.marginLeft = "7px";
      mv.title = "Clicks + Total Impact — the model Demand Gen is judged on. The main number is the deterministic read (comparable across the table).";
      rc.appendChild(mv);
    }
    tr.appendChild(rc);
    tr.appendChild(el("td", "num", fm$(w.rev7 || 0)));
    tr.appendChild(el("td", "num", String(w.txns || 0)));
    tr.appendChild(el("td", "num muted", fmR(w.p_roas)));
    if (levelSel === "ad") {
      const imp = w.impressions || 0, v3 = w.video3s || 0;
      const isVideo = !/static|image|carousel/i.test(e.ad_name || "");
      const show = isVideo && imp >= 1000 && v3 >= 100;
      const htd = el("td", "num muted", show ? Math.round(v3 / imp * 100) + "%" : "–");
      if (show && imp >= 5000) {
        const hr = v3 / imp;
        if (hr < 0.2) htd.className = "num delta down";
        else if (hr >= 0.3) htd.className = "num delta up";
      }
      tr.appendChild(htd);
    }
    const dv = get.delta(e);
    const dtd = el("td", "num", dv <= -90 ? "–" : (dv > 0 ? "+" : "") + Math.round(dv * 100) + "%");
    if (dv > -90) dtd.className += dv >= 0 ? " delta up" : " delta down";
    tr.appendChild(dtd);
    const sp = el("td");
    sp.appendChild(sparkline(e.daily.slice(-14).map(d => d.spend > 0 ? (d.rev7 || 0) / d.spend : null), 90, 26, goal));
    tr.appendChild(sp);
    const [bc, bl] = statusBadge(e);
    const btd = el("td");
    const b = el("span", "badge " + bc); b.appendChild(el("span", "dot")); b.appendChild(document.createTextNode(bl));
    btd.appendChild(b); tr.appendChild(btd);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);
  foldRows(Array.from(tbody.children), 12, container, "rows");
  const notes = [];
  if (rows.length > shown.length) notes.push(`Showing top ${shown.length} of ${rows.length} by current sort — use search to narrow.`);
  if (zeroHidden > 0) notes.push(`${zeroHidden} rows with $0 spend in this window hidden — use "Show $0 rows" to include them.`);
  if (minRoasOn && roasHidden > 0) notes.push(`${roasHidden} rows below ${ROAS_FILTER} ROAS hidden by the working-only filter.`);
  if (notes.length) container.appendChild(el("div", "muted", notes.join(" ")));
}

/* ---------- channel summary with guidance ---------- */
function channelGuidance(label, roas, goal) {
  if (label.includes("Brand")) return "Judge on incrementality, not this ROAS. Pullback in flight — watch capture.";
  if (label.includes("TOF")) return "TOF: judge on MER + first-touch over 2-4 wks, never 7d clicks.";
  if (label.includes("TikTok")) return "TW attribution broken — decide on model views / MER.";
  if (label.includes("App")) return "Separate goals (installs / Amazon rev) — not ecom ROAS.";
  if (roas == null) return "";
  if (roas >= goal * 1.2) return "Scale in 15-20% steps; watch marginal ROAS.";
  if (roas >= goal) return "Hold. Next dollar goes to the scale rows.";
  if (roas >= 1.5) return "Fix creative/bids first — no new budget.";
  return "Cut to winners before adding anything.";
}

function channelSummary() {
  const goal = DATA.meta.goal_roas;
  const groups = {
    "Meta (core)":      e => e.platform === "meta" && e.bucket === "core",
    "Google (core)":    e => e.platform === "google" && e.bucket === "core",
    "Google Brand":     e => e.platform === "google" && e.bucket === "brand",
    "Demand Gen (TOF)": e => e.bucket === "tof",
    "TikTok":           e => e.platform === "tiktok",
  };
  const card = el("div", "card");
  card.appendChild(el("h2", null, "Channel allocation — where the next dollar goes"));
  const table = el("table");
  const trh = el("tr");
  ["Bucket", "L7 spend", "share", "L7 ROAS", "Δ WoW", "L14 ROAS", "Platform ROAS", "What to do"].forEach((h, i) => {
    const th = el("th", null, h); if (i === 0 || i === 7) th.style.textAlign = "left"; trh.appendChild(th);
  });
  table.appendChild(trh);
  /* judged spend only — App/Amazon is managed off the client sheet, not allocated here */
  const camps = DATA.levels.campaign.filter(c => bucketVisible(c.bucket));
  const totalL7 = camps.reduce((s, c) => s + (c.windows.L7.spend || 0), 0);
  const rowsAgg = [];
  for (const [label, pred] of Object.entries(groups)) {
    const g = camps.filter(pred);
    if (!g.length) continue;
    const agg = w => {
      const s = g.reduce((a, c) => a + (c.windows[w].spend || 0), 0);
      const r = g.reduce((a, c) => a + (c.windows[w].rev7 || 0), 0);
      const pv = g.reduce((a, c) => a + (c.windows[w].p_value || 0), 0);
      const ps = g.reduce((a, c) => a + (c.windows[w].p_spend || 0), 0);
      const mvr = g.reduce((a, c) => a + (c.windows[w].mv_rev || 0), 0);
      return {s, roas: s > 0 ? r / s : null, proas: ps > 0 ? pv / ps : null,
              mv: s > 0 && mvr > 0 ? mvr / s : null};
    };
    const l7 = agg("L7"), p7 = agg("P7"), l14 = agg("L14");
    rowsAgg.push({label, roas: l7.roas, s: l7.s});
    const tr = el("tr");
    const nt = el("td", null, label); nt.style.textAlign = "left"; nt.style.fontWeight = "600"; tr.appendChild(nt);
    tr.appendChild(el("td", "num", fm$(l7.s)));
    tr.appendChild(el("td", "num muted", totalL7 ? Math.round(l7.s / totalL7 * 100) + "%" : "–"));
    const rcell = el("td", "num roascell", fmR(l7.roas));
    if (label.includes("core") && l7.roas != null) rcell.appendChild(roasBar(l7.roas, goal));
    if (label.includes("TOF") && l7.mv != null) {
      const mv = el("span", "mult-chip", "MV " + l7.mv.toFixed(2));
      mv.style.marginLeft = "7px";
      mv.title = "Clicks + Total Impact — the model Demand Gen is judged on.";
      rcell.appendChild(mv);
    }
    tr.appendChild(rcell);
    const d = (l7.roas != null && p7.roas) ? (l7.roas - p7.roas) / p7.roas : null;
    const dtd = el("td", "num", d == null ? "–" : (d > 0 ? "+" : "") + Math.round(d * 100) + "%");
    // color WoW only where 7d click ROAS is a valid judgment (core rows)
    const judgeable = label.includes("core");
    if (d != null && judgeable) dtd.className += d >= 0 ? " delta up" : " delta down";
    else dtd.className += " muted";
    tr.appendChild(dtd);
    tr.appendChild(el("td", "num", fmR(l14.roas)));
    tr.appendChild(el("td", "num muted", l7.proas ? fmR(l7.proas) : "–"));
    tr.appendChild(el("td", "guide", channelGuidance(label, l7.roas, goal)));
    table.appendChild(tr);
  }
  // takeaway: best and worst judgeable bucket
  const judge = rowsAgg.filter(r => r.label.includes("core") && r.roas != null);
  if (judge.length) {
    judge.sort((a, b) => b.roas - a.roas);
    const best = judge[0], worst = judge[judge.length - 1];
    card.insertBefore(takeaway(
      best.label + " leads at " + best.roas.toFixed(2) +
      (judge.length > 1 ? " — " + worst.label + " drags at " + worst.roas.toFixed(2) + " on " + fmK(worst.s) + " L7." : "."),
      best.roas >= goal ? "good" : "warn"), card.children[1]);
  }
  const scroll = el("div", "tscroll");
  scroll.appendChild(table);
  card.appendChild(scroll);
  return card;
}

/* ---------- creative intelligence ---------- */
function ciTable(title, rows, cols) {

/* ---------- copyable / expandable names -----------------------------------
   TRX ad names are 150-200 chars of key-value taxonomy tokens (s-/as-/h-/p-/…)
   with the actual asset FILE NAME buried mid-string. Click any name to pop a
   selectable code block — the free-text file-name tokens are highlighted so you
   can grab them to search — plus a one-click "copy full name". */
function toast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = el("div", "toast"); t.id = "toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 1600);
}
function copyText(s) {
  const done = () => toast("Copied to clipboard");
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = s; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) {}
    document.body.removeChild(ta);
  };

}
// taxonomy keys are a KNOWN small set (s-/as-/h-/p-/c-/o-/lp-/a-/m-/t-/gen-/WL=/…);
// a token that isn't one of these and isn't a bare format word is a free-text
// asset/file-name token (e.g. AorB-061526, TSS_TRX_020626_9x16_V2) -> highlight it.
const _TAXO = /^(s|as|m|h|p|c|t|o|lp|a|gen|wl|whitelist|creative)[-=]/i,
      _FMT = /^(video|static|image|carousel|gif)$/i;

  // and not a bare format word — those get highlighted.

  (fullName || "").split("_").forEach((tok, i) => {
    if (i) code.appendChild(el("span", "nsep", "_"));
    const isFile = tok && !_TAXO.test(tok) && !_FMT.test(tok);
    code.appendChild(el("span", isFile ? "nfile" : null, tok));
  });
  return code;
}
let _namepop = null;
function closeNamePop() {

}
