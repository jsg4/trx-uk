    let leak = null;
    for (let i = 0; i < stages.length - 1; i++) {
      const c = conv(L, i), p = conv(P, i);
      if (c == null || !p) continue;
      const rel = (c - p) / p;
      if (rel < -0.10 && (!leak || rel < leak.rel)) leak = {i, rel};
    }
    body.appendChild(takeaway(leak
      ? "Biggest WoW leak: " + stages[leak.i][0] + " → " + stages[leak.i + 1][0] + " down " +
        Math.round(-leak.rel * 100) + "% vs prior 7 days."
      : "No funnel step leaking week-over-week past 10%.",
      leak ? (leak.rel < -0.25 ? "bad" : "warn") : "good"));

    /* vertical mirrored funnel, log-scaled half-widths (drops are large) */
    const n = stages.length, ROWH = 74;
    const VW = 300, VH = n * ROWH;
    const cx = VW / 2, maxHW = VW / 2 - 8, floorHW = 11;
    const pos = L.filter(v => v > 0);
    const vmax = Math.max(...L, 1);
    const vmin = Math.max(1, pos.length ? Math.min(...pos) : 1);
    const hw = L.map(v => {
      if (!v || vmax <= vmin) return floorHW;
      const f = (Math.log(v) - Math.log(vmin)) / (Math.log(vmax) - Math.log(vmin));
      return floorHW + f * (maxHW - floorHW);
    });
    const yc = i => i * ROWH + ROWH / 2;
    const pts = [[hw[0], 0], ...hw.map((v, i) => [v, yc(i)]), [hw[n - 1], VH]];
    let right = `M ${cx + pts[0][0]} ${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0, y0] = pts[i - 1], [x1, y1] = pts[i], my = (y0 + y1) / 2;
      right += ` C ${cx + x0} ${my}, ${cx + x1} ${my}, ${cx + x1} ${y1}`;
    }
    let left = "";
    for (let i = pts.length - 1; i > 0; i--) {
      const [x0, y0] = pts[i], [x1, y1] = pts[i - 1], my = (y0 + y1) / 2;
      left += ` C ${cx - x0} ${my}, ${cx - x1} ${my}, ${cx - x1} ${y1}`;
    }
    const dPath = right + ` L ${cx - pts[pts.length - 1][0]} ${VH}` + left + " Z";

    const grid = el("div", "vfun");
    grid.style.setProperty("--vfrow", ROWH + "px");
    const labs = el("div", "vlabs");
    stages.forEach(([label, v, pv]) => {
      const t = el("div", "vl");
      t.appendChild(el("b", null, fmN(v)));
      t.appendChild(document.createTextNode(label));
      t.title = label + ": " + Math.round(v).toLocaleString("en-US") +
        (pv ? " · prior 7d " + Math.round(pv).toLocaleString("en-US") : "");
      labs.appendChild(t);
    });
    grid.appendChild(labs);
    const svg = sv("svg", {viewBox: `0 0 ${VW} ${VH}`, preserveAspectRatio: "none", style: `height:${VH}px`});
    const defs = sv("defs", {});
    const lg = sv("linearGradient", {id: "vfgrad", x1: "0", y1: "0", x2: "0", y2: "1"});
    lg.appendChild(sv("stop", {offset: "0%", "stop-color": "var(--fn-2)"}));
    lg.appendChild(sv("stop", {offset: "55%", "stop-color": "var(--fn-4)"}));
    lg.appendChild(sv("stop", {offset: "100%", "stop-color": "var(--fn-5)"}));
    defs.appendChild(lg); svg.appendChild(defs);
    svg.appendChild(sv("path", {d: dPath, fill: "url(#vfgrad)"}));
    for (let i = 1; i < n; i++) {
      const bw = Math.min(maxHW, (hw[i - 1] + hw[i]) / 2);
      svg.appendChild(sv("line", {x1: cx - bw, x2: cx + bw, y1: i * ROWH, y2: i * ROWH,
                                  stroke: "var(--surface-1)", "stroke-width": 2}));
    }
    grid.appendChild(svg);
    const drops = el("div", "vdrops");
    for (let i = 0; i < n - 1; i++) {
      const c = conv(L, i), p = conv(P, i);
      const d0 = el("div", "vd0" + (leak && leak.i === i ? " leak" : ""));
      const line1 = el("div");
      line1.appendChild(el("b", null, c == null ? "–" : (c * 100).toFixed(c < 0.1 ? 1 : 0) + "%"));
      line1.appendChild(document.createTextNode(" " + stages[i][0].toLowerCase() + " → " + stages[i + 1][0].toLowerCase()));
      d0.appendChild(line1);
      if (c != null && p) {
        const rel = (c - p) / p, cls = Math.abs(rel) < 0.03 ? "flat" : rel > 0 ? "up" : "down";
        const chip = el("span", "rchip " + cls,
          (cls === "flat" ? "· flat" : (rel > 0 ? "▲ " : "▼ ") + Math.round(Math.abs(rel) * 100) + "%") + " WoW");
        chip.title = "prior 7 days: " + (p * 100).toFixed(1) + "%";
        d0.appendChild(chip);
      }
      drops.appendChild(d0);
    }
    grid.appendChild(drops);
    body.appendChild(grid);

    /* scope label pill */
    if (sc.label) body.appendChild(el("div", "fscope", sc.label));

    /* Demand Gen modeled-views context — only when DG is included */
    if (scope === "incl_dg" && F.dg) {
      const dg = F.dg;
      const box = el("div", "dgctx");
      const mv = dg.mv_roas_l7, det = dg.det_roas_l7;
      const parts = [];
      if (dg.spend_l7 != null) parts.push(fm$(dg.spend_l7) + " Demand Gen (TOF) spend L7");
      if (mv != null) parts.push("Clicks + Total Impact 7D ROAS " + Number(mv).toFixed(2));
      if (det != null) parts.push("deterministic " + Number(det).toFixed(2) + " understates it");
      box.appendChild(el("b", null, "Demand Gen is a modeled-views channel — "));
      box.appendChild(document.createTextNode(parts.join(" · ") + "."));
      body.appendChild(box);
    }
    if (F.note) body.appendChild(el("div", "fsub", F.note));
  }

  rebuild();
  return card;
}

/* v10: progressive disclosure — hide list items past `limit` behind one toggle */
function foldRows(nodes, limit, mount, noun) {
  const extra = nodes.slice(limit);
  if (!extra.length) return;
  extra.forEach(n => n.classList.add("chg-hidden"));
  const more = el("button", "chg-more");
  let open = false;
  const setLabel = () => { more.textContent = open
    ? "Show fewer \u2191" : "Show all " + nodes.length + " " + noun + " \u2193"; };
  setLabel();
  more.addEventListener("click", () => {
    open = !open;
    extra.forEach(n => n.classList.toggle("chg-hidden", !open));
    setLabel();
  });
  mount.appendChild(more);
}

/* Daily Guide strip — the at-a-glance morning read at the top of the cockpit.
   Sheet gear/total revenue + blended MER (vs goals), platform ad spend by
   channel, and Triple Whale new-customer economics + AOV. L7-anchored, WoW deltas,
   variance-to-goal color where a goal exists. Reads DATA.daily_guide (additive);
   returns null if the block is absent so the cockpit degrades cleanly. */
function dailyGuideStrip() {
  const g = DATA.daily_guide;
  if (!g) return null;
  const wrap = el("div", "dgstrip");
  const head = el("div", "dg-head");
  head.appendChild(el("div", "dg-t", "Daily guide"));
  const bits = ["L7 rolling"];
  const md = (iso) => iso ? iso.slice(5).replace("-", "/") : null;
  if (g.sheet_through) bits.push("revenue from pacing sheet thru " + md(g.sheet_through));
  if (g.nb_through) bits.push("new-customer from Triple Whale thru " + md(g.nb_through));
  head.appendChild(el("div", "dg-s", bits.join(" · ")));
  wrap.appendChild(head);

  const S = g.series || {};
  // DG toggle: swap in the DG-inclusive variant of each new-customer sparkline.
  const sPick = (base) => (inclDG && S[base + "_incl"]) ? S[base + "_incl"] : S[base];
  const tiles = el("div", "tiles");
  const stColor = (st) => st === "good" ? "var(--st-good)" : st === "bad" ? "var(--st-crit)" : "inherit";
  const sparkEl = (vals, goal) => {
    if (!vals || vals.filter(v => v != null).length < 2) return null;
    const d = el("div", "spark");
    d.appendChild(sparkline(vals, 200, 34, goal));
    return d;
  };
  // Each tile: label, big value, a PROMINENT week-over-week comparison row
  // (arrow + delta% + prior value), a 30-day sparkline, then a quiet basis line.
  // favor = which direction is good: "good" (up=green), "bad", or "flat" (neutral).
  const mkt = (lbl, val, o) => {
    o = o || {};
    const t = el("div", "tile" + (o.status && o.status !== "na" ? " st-" + o.status : ""));
    const top = el("div", "tile-top");
    top.appendChild(el("div", "lbl", lbl));
    t.appendChild(top);
    const v = el("div", "val", val);
    if (o.valColor) v.style.color = o.valColor;
    t.appendChild(v);
    if (o.wow != null) {
      const pct = Math.round(o.wow * 100);
      const cls = o.favor === "good" ? "up" : o.favor === "bad" ? "down" : "flat";
      const cmp = el("div", "cmp " + cls);
      cmp.appendChild(el("span", "cmp-d", (pct >= 0 ? "▲ +" + pct : "▼ " + Math.abs(pct)) + "%"));
      if (o.prior) cmp.appendChild(el("span", "cmp-vs", "vs " + o.prior + " last wk"));
      t.appendChild(cmp);
    }
    const sp = sparkEl(o.spark, o.sparkGoal);
    if (sp) t.appendChild(sp);
    if (o.basis) t.appendChild(el("div", "basis", o.basis));
    tiles.appendChild(t);
  };
  const revStatus = (l7, goal) => !goal ? "na" : (l7 / goal >= 0.95 ? "good" : l7 / goal >= 0.8 ? "warn" : "bad");
  const upFavor = (w) => (w == null ? "flat" : w >= 0 ? "good" : "bad");   // higher is better
  const dnFavor = (w) => (w == null ? "flat" : w <= 0 ? "good" : "bad");   // lower is better
  const cacStatus = (w) => w == null ? "na" : w <= 0 ? "good" : w <= 0.15 ? "warn" : "bad";

  const r = g.revenue;
  if (r) {
    let st = revStatus(r.gear.l7, r.gear.goal_l7);
    mkt("Gear revenue", fmK(r.gear.l7), {
      wow: r.gear.wow, prior: fmK(r.gear.p7), favor: upFavor(r.gear.wow), spark: S.gear_rev,
      basis: "of " + fmK(r.gear.goal_l7) + " goal · yest " + fmK(r.gear.yday),
      status: st, valColor: stColor(st) });
    st = revStatus(r.total.l7, r.total.goal_l7);
    mkt("Total Shopify revenue", fmK(r.total.l7), {
      wow: r.total.wow, prior: fmK(r.total.p7), favor: upFavor(r.total.wow), spark: S.total_rev,
      basis: "of " + fmK(r.total.goal_l7) + " goal · yest " + fmK(r.total.yday),
      status: st, valColor: stColor(st) });
    if (r.mer && r.mer.l7 != null) {
      const mt = r.mer.target || 2.5;
      const st2 = r.mer.l7 >= mt ? "good" : r.mer.l7 >= mt * 0.75 ? "warn" : "bad";
      mkt("Blended MER", r.mer.l7.toFixed(2), {
        wow: r.mer.wow, prior: r.mer.p7 != null ? r.mer.p7.toFixed(2) : null, favor: upFavor(r.mer.wow),
        spark: S.mer, sparkGoal: mt,
        basis: "target " + mt.toFixed(1) + (r.mer.yday != null ? " · yest " + r.mer.yday.toFixed(2) : ""),
        status: st2, valColor: stColor(st2) });
    }
  }
  const sp = g.spend;
  if (sp && sp.managed_l7 != null) {
    const chList = (inclDG && sp.by_channel_incl) ? sp.by_channel_incl : sp.by_channel;
    const ch = (chList || []).map(c => c.label + " " + fmK(c.l7)).join(" · ");
    mkt("Ad spend", fmK(sp.managed_l7), {
      wow: sp.managed_wow, prior: fmK(sp.managed_p7), favor: "flat", spark: S.managed_spend,
      basis: ch + " · managed (incl affiliate/trad)" });
  }
  const ncScope = inclDG ? "core+brand+DG (DG on Total Impact)" : "core+brand";
  const nc = (inclDG && g.nc_incl) ? g.nc_incl : g.nc;
  if (nc) {
    if (nc.rev_l7 != null)
      mkt("New-customer revenue", fmK(nc.rev_l7), {
        wow: nc.rev_wow, prior: fmK(nc.rev_p7), favor: upFavor(nc.rev_wow), spark: sPick("nc_rev"),
        basis: "first-purchase · " + ncScope + " · Triple Whale" });
    if (nc.roas_l7 != null) {
      const rw = nc.roas_p7 ? (nc.roas_l7 - nc.roas_p7) / nc.roas_p7 : null;
      mkt("New-customer ROAS", nc.roas_l7.toFixed(2), {
        wow: rw, prior: nc.roas_p7 != null ? nc.roas_p7.toFixed(2) : null, favor: upFavor(rw),
        spark: sPick("nc_roas"), sparkGoal: nc.roas_goal || 2,
        basis: "first-purchase · " + ncScope + " · goal " + (nc.roas_goal || 2).toFixed(1) });
    }
  }
  const c = (inclDG && g.cac_incl) ? g.cac_incl : g.cac;
  if (c && c.l7 != null)
    mkt("New-customer CAC", fm$(c.l7), {
      wow: c.wow, prior: c.p7 != null ? fm$(c.p7) : null,
      favor: dnFavor(c.wow), spark: sPick("cac"), status: cacStatus(c.wow),
      basis: c.new_txns + " new cust · Google+Meta, " + (inclDG ? "incl Demand Gen" : "excl Demand Gen") + " · Triple Whale" });
  const av = (inclDG && g.aov_incl) ? g.aov_incl : g.aov;
  if (av && av.l7 != null)
    mkt("AOV", fm$(av.l7), {
      wow: av.wow, prior: av.p7 != null ? fm$(av.p7) : null, favor: "flat", spark: sPick("aov"),
      basis: av.src === "L7 cash" ? "paid cash · promo weeks compress it" : "account cash avg" });

  wrap.appendChild(tiles);
  return wrap;
}

  /* decide today (rendered after tiles + trend) */
  const dcard = el("div", "card");
  dcard.appendChild(el("h2", null, "Decide today"));
  const dgrid = el("div", "decide");
  const mkCol = (cls, title, items, empty) => {
    const c = el("div", "dcol " + cls);
    const h = el("h3"); h.appendChild(el("span", "dot")); h.appendChild(document.createTextNode(title));
    c.appendChild(h);
    if (!items || !items.length) c.appendChild(el("div", "dempty", empty));
    (items || []).forEach(it => {
      const d = el("div", "ditem");
      d.appendChild(qwhat(it.what));
      d.appendChild(el("div", "a", it.action));
      if (it.detail && it.detail.length) {
        const kids = el("div", "dkids");
        it.detail.forEach(k => {
          const row = el("div", "dkid k-" + k.kind);
          row.appendChild(el("span", "kdot"));
          const prefix = k.kind === "pause" ? "pause: " : (k.kind === "best" ? "best inside: " : "winner: ");
          const nm = el("span", "knm", prefix + k.name);
          nm.title = k.name;
          row.appendChild(nm);
          row.appendChild(el("span", "kv", "$" + Math.round(k.spend).toLocaleString() + " · " + k.roas.toFixed(2)));
          kids.appendChild(row);
        });
        d.appendChild(kids);
      }
      c.appendChild(d);
    });
    foldRows(Array.from(c.querySelectorAll(".ditem")), 3, c, "items");
    return c;
  };
  dgrid.appendChild(mkCol("d-now", "DO NOW", dec.do_now, "Nothing bleeding. Good."));
  dgrid.appendChild(mkCol("d-scale", "SCALE", dec.scale, "No campaign meets the scale gate this week (needs " + (m.goal_roas * 1.2).toFixed(1) + "+ on $250+ L7)."));
  dgrid.appendChild(mkCol("d-watch", "WATCH", dec.watch, "Nothing deteriorating."));
  dcard.appendChild(dgrid);

  /* tiles */
  const s = ins.summary;
  const pacing = ins.pacing;
  const goal = m.goal_roas;
  const days = dailySeries();
  const tiles = el("div", "tiles");
  const mk = (lbl, val, deltaTxt, deltaCls, spark, status) => {
    const t = el("div", "tile" + (status && status !== "na" ? " st-" + status : ""));
    const top = el("div", "tile-top");
    top.appendChild(el("div", "lbl", lbl));
    /* chip carries ONLY the leading signed delta token; the rest is a quiet basis line */
    let chipTxt = null, basisTxt = deltaTxt || null;
    if (deltaTxt) {
      const m = deltaTxt.match(/^([+-][\d.]+(?:%|pp)?)[\s·]*(.*)$/);
      if (m) { chipTxt = m[1]; basisTxt = m[2] || null; }
    }
    if (chipTxt) {
      if (/^\+/.test(chipTxt)) chipTxt = "▲ " + chipTxt.slice(1);
      else if (/^-\d/.test(chipTxt)) chipTxt = "▼ " + chipTxt.slice(1);
      top.appendChild(el("div", "delta " + (deltaCls || ""), chipTxt));
    }
    t.appendChild(top);
    t.appendChild(el("div", "val", val));
    if (basisTxt) t.appendChild(el("div", "basis", basisTxt));
    if (spark) t.appendChild(spark);
    return t;
  };
  const bandStatus = off => off == null ? "na" : Math.abs(off) <= 0.1 ? "good" : Math.abs(off) <= 0.2 ? "warn" : "bad";
  // headline blend (reads global inclDG): excl == precomputed core numbers,
  // incl folds Demand Gen (tof) in on Clicks + Total Impact
  const aggL7 = dgAgg("L7"), aggP7 = dgAgg("P7");
  const p7roas = aggP7.roas;
  const coreRoas = aggL7.roas;
  let dTxt = null, dCls = null;
  if (coreRoas != null && p7roas) {
    const dd = (coreRoas - p7roas) / p7roas;
    dTxt = (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs prior 7d";
    dCls = dd >= 0 ? "up" : "down";
  }
  /* reference-style KPI sparklines: last 14 days, goal line where one exists */
  const last14 = days.slice(-14);
  const spk = (vals, goalLine) => {
    if (vals.filter(v => v != null).length < 2) return null;
    const d = el("div", "spark");
    d.appendChild(sparkline(vals, 200, 34, goalLine));
    return d;
  };
  const t1 = mk(inclDG ? "Core + DG ROAS" : "Core ROAS", coreRoas == null ? "–" : coreRoas.toFixed(2), dTxt, dCls,
    spk(last14.map(d => d.roll), goal),
    coreRoas == null ? "na" : coreRoas >= goal ? "good" : coreRoas >= 1.5 ? "warn" : "bad");
  t1.querySelector(".val").style.color = coreRoas != null && coreRoas >= goal ? "var(--st-good)" : (coreRoas != null && coreRoas < 1.5 ? "var(--st-crit)" : "inherit");
  if (inclDG) {
    const chip = el("span", "dgchip", "incl DG");
    chip.title = "Demand Gen folded in on Clicks + Total Impact (7D)";
    t1.querySelector(".tile-top").appendChild(chip);
  }
  tiles.appendChild(t1);
  const ydayFromSheet = pacing && pacing.yday && pacing.yday.spend;
  if (ydayFromSheet) {
    const plan = pacing.yday.plan;
    const dd = plan ? (pacing.yday.spend - plan) / plan : null;
    tiles.appendChild(mk("Spend yesterday", fmK(pacing.yday.spend),
      plan ? (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs " + fmK(plan) + " plan" : null,
      dd != null && Math.abs(dd) > 0.1 ? "down" : "up",
      spk(last14.map(d => d.meta + d.google + d.tiktok)), bandStatus(dd)));
  } else if (s.yday_spend != null) {
    const dd = s.avg7_daily_spend ? (s.yday_spend - s.avg7_daily_spend) / s.avg7_daily_spend : null;
    tiles.appendChild(mk("Spend yesterday", fmK(s.yday_spend),
      dd == null ? null : (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs 7-day avg",
      dd != null && Math.abs(dd) > 0.25 ? "down" : null,
      spk(last14.map(d => d.meta + d.google + d.tiktok))));
  }
  if (pacing && pacing.pace != null) {
    const pc = pacing.pace;
    const cls = Math.abs(pc - 1) <= 0.1 ? "up" : "down";
    const est = pacing.estimated_days ? ` (${pacing.estimated_days}d est.)` : "";
    const t = mk("MTD vs plan", Math.round(pc * 100) + "%",
      fmK(pacing.mtd_spend) + " vs " + fmK(pacing.mtd_plan) + " plan" + est, cls,
      null, bandStatus(pc - 1));
    t.title = pacing.source || "";
    t.querySelector(".val").style.color = Math.abs(pc - 1) <= 0.1 ? "var(--st-good)"
      : (Math.abs(pc - 1) <= 0.2 ? "inherit" : "var(--st-crit)");
    tiles.appendChild(t);
  }
  {
    // yesterday's sheet cells can be mid-edit (zero) — fall back to the last populated day
    const merRow = (pacing && pacing.yday && pacing.yday.mer) ? {...pacing.yday, when: "yesterday"}
      : (pacing && pacing.last_mer) ? {...pacing.last_mer, when: pacing.last_mer.date.slice(5).replace("-", "/")} : null;
    if (merRow) {
      const merT = DATA.meta.mer_target || 2.5;
      const t = mk("Blended MER", merRow.mer.toFixed(2),
        "rev " + fmK(merRow.rev || 0) + " · target " + merT.toFixed(1) + " · pacing workbook",
        null, null, merRow.mer >= merT ? "good" : merRow.mer >= merT * 0.75 ? "warn" : "bad");
      t.querySelector(".val").style.color = merRow.mer >= merT ? "var(--st-good)"
        : (merRow.mer < merT * 0.75 ? "var(--st-crit)" : "inherit");
      tiles.appendChild(t);
    }
  }
  // New-customer CAC — core+brand spend/ftx (excl); +tof (incl). Client-side so
  // excl-DG cleanly removes Demand Gen (the precomputed cac_new_l7 baked tof in).
  const cacL7 = aggL7.cac, cacP7 = aggP7.cac;
  if (cacL7 != null) {
    const dd = cacP7 ? (cacL7 - cacP7) / cacP7 : null;
    // lower CAC is better: arrow shows direction, color shows goodness
    const cacTile = mk("New-customer CAC", fm$(cacL7),
      (dd == null ? "" : (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs prior 7d · ")
        + Math.round(aggL7.ftx) + " new customers (paid, core+brand" + (inclDG ? "+DG" : "") + ", ex-App/Amazon)",
      dd == null ? null : (dd <= 0 ? "up" : "down"),
      spk(last14.map(d => d.cacRoll)), dd == null ? "na" : dd <= 0 ? "good" : dd <= 0.15 ? "warn" : "bad");
    if (inclDG) cacTile.title = "Demand Gen first-time customers are counted on Triple Whale deterministic ftx — Total Impact gives revenue, not customer counts.";
    tiles.appendChild(cacTile);
  }
  const nvL7 = aggL7.nvPct, nvP7 = aggP7.nvPct;
  if (nvL7 != null) {
    const dpp = nvP7 != null ? (nvL7 - nvP7) * 100 : null;
    tiles.appendChild(mk("New visitor %", Math.round(nvL7 * 100) + "%",
      (dpp == null ? "share of paid visits" : (dpp >= 0 ? "+" : "") + dpp.toFixed(1) + "pp vs prior 7d")
        + (inclDG ? " · core+brand+DG" : ""),
      dpp == null ? null : (dpp >= 0 ? "up" : "down"),
      spk(last14.map(d => d.nvRoll)), dpp == null ? "na" : dpp >= 0 ? "good" : dpp > -3 ? "warn" : "bad"));
  }
  // mix-context tiles live on the pacing page; the cockpit stays one screen
  if (typeof PAGE === "undefined" || PAGE === "pacing") {
    {
      /* DG judged on Clicks + Total Impact — surface that read on the tile */
      const tof = DATA.levels.campaign.filter(c => c.bucket === "tof");
      const tsp = tof.reduce((a, c) => a + (c.windows.L7.spend || 0), 0);
      const tmv = tof.reduce((a, c) => a + (c.windows.L7.mv_rev || 0), 0);
      const mvTxt = tsp > 0 && tmv > 0 ? " · MV ROAS " + (tmv / tsp).toFixed(2) : "";
      tiles.appendChild(mk("TOF / Demand Gen", fmK(s.tof_spend_l7),
        (s.total_spend_l7 ? Math.round(s.tof_spend_l7 / s.total_spend_l7 * 100) + "% of L7 platform spend" : "") + mvTxt, null));
    }
    tiles.appendChild(mk("Brand L7", fmK(s.brand_spend_l7),
      s.total_spend_l7 ? Math.round(s.brand_spend_l7 / s.total_spend_l7 * 100) + "% of L7 platform spend" : "", null));
  }
  if (PAGE === "pacing" || PAGE === "cockpit") app.appendChild(tiles);


  /* trend */
  const tc = el("div", "card");
  {
    const ch = el("div", "chead");
    ch.appendChild(el("div", "ct", "Performance trends"));
    ch.appendChild(el("div", "cs", "Daily core ROAS + 7-day rolling line vs goal · spend stacked by channel · 30 days"));
    tc.appendChild(ch);
  }
  {
    const rolls = days.map(d => d.roll).filter(v => v != null);
    const above = rolls.filter(v => v >= goal).length;
    const dir = rolls.length >= 8 ? (rolls[rolls.length - 1] - rolls[rolls.length - 8]) / rolls[rolls.length - 8] : null;
    const dirTxt = dir == null ? "" : Math.abs(dir) < 0.05 ? " and flat week-over-week" : dir > 0 ? " and improving (" + Math.round(dir * 100) + "% WoW)" : " and declining (" + Math.round(dir * 100) + "% WoW)";
    tc.appendChild(takeaway(
      above === 0
        ? "The 7-day line has not touched the " + goal.toFixed(1) + " goal once in 30 days — currently " + (rolls.length ? rolls[rolls.length - 1].toFixed(2) : "–") + dirTxt + ". This is structural, not a bad day."
        : above + " of the last " + rolls.length + " days at/above goal — currently " + rolls[rolls.length - 1].toFixed(2) + dirTxt + ".",
      above === 0 ? "bad" : above < rolls.length / 2 ? "warn" : "good"));
  }
  tc.appendChild(trendChart(days));
  {
    /* reference-style stat row under the chart: L7 totals with WoW deltas */
    const c7 = funnelAgg("all", "L7"), p7 = funnelAgg("all", "P7");
    const st = el("div", "chstats");
    const cell = (lbl, val, cur, prev, upGood = true) => {
      const d = el("div");
      d.appendChild(el("div", "cs-l", lbl));
      const v = el("div", "cs-v", val);
      if (prev) {
        const rel = (cur - prev) / prev;
        if (Math.abs(rel) >= 0.005) {
          const good = upGood ? rel >= 0 : rel <= 0;
          v.appendChild(el("span", "delta " + (good ? "up" : "down"),
            (rel >= 0 ? "▲ " : "▼ ") + Math.abs(Math.round(rel * 100)) + "%"));
        }
      }
      d.appendChild(v);
      return d;
    };
    st.appendChild(cell("Judged spend — L7", fmK(c7.spend), c7.spend, p7.spend, false));
    st.appendChild(cell("revenue — L7", fmK(c7.rev), c7.rev, p7.rev));
    const ctr = c7.impr ? c7.clicks / c7.impr : null, pctr = p7.impr ? p7.clicks / p7.impr : null;
    if (ctr != null) st.appendChild(cell("CTR — L7", (ctr * 100).toFixed(2) + "%", ctr, pctr));
    st.appendChild(cell("Purchases — L7", fmN(c7.txns), c7.txns, p7.txns));
    tc.appendChild(st);
  }
  if (PAGE === "pacing") app.appendChild(tc);
  if (PAGE === "cockpit") {
    /* hero row: trends beside the funnel, reference layout */
    const row = el("div", "cockrow");
    row.appendChild(tc);
    row.appendChild(funnelCard());
    app.appendChild(row);
  }

  /* decide today — after the numbers, before allocation */
  if (PAGE === "performance") app.appendChild(dcard);
  if (PAGE === "performance" && DATA.changes && DATA.changes.items && DATA.changes.items.length)
    app.appendChild(changeLog());

  /* channel allocation */
  if (PAGE === "performance") app.appendChild(channelSummary());
  if (PAGE === "performance") app.appendChild(funnelCard());

  /* routine */
  const rc = el("div", "card");
  rc.appendChild(el("h2", null, "How to run this dashboard"));
  const rgrid = el("div", "routine");
  const mkRoutine = (title, steps) => {
    const d = el("div");
    d.appendChild(el("h2", null, title));
    const ol = el("ol");
    steps.forEach(([b, rest]) => {
      const li = el("li");
      li.appendChild(el("b", null, b + " "));
      li.appendChild(document.createTextNode(rest));
      ol.appendChild(li);
    });
    d.appendChild(ol);
    return d;
  };
  rgrid.appendChild(mkRoutine("Daily — 5 minutes", [
    ["Freshness:", "the chip up top must say data through yesterday. If STALE, fix the pipeline before trusting anything."],
    ["Clear DO NOW:", "act on every red item, today. That's the whole daily job."],
    ["Pacing:", "spend yesterday + MTD vs plan. Off by >10%, adjust budgets."],
    ["Don't judge ROAS daily:", "recent accrual is still maturing (shaded zone). No kill/scale calls on <72h."],
  ]));
  rgrid.appendChild(mkRoutine("Weekly — Monday, 30 minutes", [
    ["Scale & cut:", "work the SCALE and WATCH queues plus campaign badges on L7/L14 windows."],
    ["Creative:", "kill weak hooks after $500-1K spend, brief iterations on the strongest angles."],
    ["Allocation:", "move the next dollar where the LAST dollar returned most (channel table guidance)."],
    ["Reconcile:", "platform vs divergence — decide on NB, use platform for direction only."],
  ]));
  rc.appendChild(rgrid);
  if (PAGE === "reference") {
    app.appendChild(rc);
    const ic = integrityCard();
    if (ic) app.appendChild(ic);
  }

  /* weekly section */
  const sh = el("div", "section-h");
  sh.appendChild(el("h2", null, "Creative review"));
  sh.appendChild(el("span", "sub", "Meta creative on numbers · kill/scale creatives only after $500-1K spend"));
  if (PAGE === "creative") app.appendChild(sh);

  if (PAGE === "testing" && DATA.creative && DATA.creative.testing) app.appendChild(testingMonitor());
  if (PAGE === "creative") app.appendChild(creativeHealth());
  if (PAGE === "creative" && DATA.creative) app.appendChild(creativeIntelligence());

  /* detail tables — self-rebuilding card so toggles never repaint the page */
  const tcard = el("div", "card");
  buildDetail(tcard);
  if (PAGE === "performance" || PAGE === "creative") app.appendChild(tcard);
  if (PAGE === "cockpit") {
    const wrow = el("div", "wrow");
    wrow.appendChild(goalTrackCard(days));
    wrow.appendChild(spendMixCard());
    wrow.appendChild(calloutsCard());
    app.appendChild(wrow);
    app.appendChild(decideMini());
    const dh = integrityStrip();
    if (dh) app.appendChild(dh);
    /* nav cards retired — the sidebar owns navigation; no duplicate wayfinding */
  }
  if (PAGE === "ltv") ltvPage(app);

  /* working / attention (weekly evidence) */
  const insWrap = el("div", "card");
  insWrap.appendChild(el("h2", null, "Evidence — what's working / what needs attention"));
  const grid = el("div", "insights");
  const mkList = (title, items) => {
    const d = el("div");
    d.appendChild(el("h2", null, title));
    const ul = el("ul");
    (items || []).forEach(it => {
      const li = el("li", "sev-" + (it.sev || "info"));
      li.textContent = it.text;
      ul.appendChild(li);
    });
    if (!items || !items.length) ul.appendChild(el("li", "muted", "Nothing at current thresholds."));
    d.appendChild(ul);
    foldRows(Array.from(ul.children), 4, d, "items");
    return d;
  };
  grid.appendChild(mkList("Working", ins.working));
  grid.appendChild(mkList("Needs attention", ins.issues));
  insWrap.appendChild(grid);
  if (PAGE === "performance") app.appendChild(insWrap);

  /* context + playbook */
  const cx = el("div", "card ctx");
  cx.appendChild(el("h2", null, "Context — what's in flight"));
  const cul = el("ul", "insights");
  (m.context || []).forEach(c => {
    const li = el("li");
    li.appendChild(el("span", "d", c.date));
    li.appendChild(document.createTextNode(c.text));
    cul.appendChild(li);
  });
  cx.appendChild(cul);
  foldRows(Array.from(cul.children), 5, cx, "updates");
  const det = el("details");
  det.appendChild(el("summary", null, "Playbook rules this dashboard applies"));
  const pul = el("ul");
  (m.playbook || []).forEach(p => { const li = el("li"); li.style.margin = "6px 0"; li.style.fontSize = "12.5px"; li.textContent = p; pul.appendChild(li); });
  det.appendChild(pul);
  cx.appendChild(det);
  if (PAGE === "pacing") app.appendChild(cx);

  /* footer */
  const f = el("footer");
  f.appendChild(el("div", null, "Definitions & data rules"));
  const ful = el("ul");
  (m.notes || []).forEach(nt => ful.appendChild(el("li", null, nt)));
  ful.appendChild(el("li", null, "Generated " + m.generated_at + " · Sources: Triple Whale export API (attribution + Meta platform-reported at 7d-click/1d-view), Google Ads API (platform)."));
  f.appendChild(ful);
  if (PAGE === "reference") app.appendChild(f);
  else app.appendChild(miniFooter());
}
</script>
</body>
</html>
